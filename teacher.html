<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام المدرس المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #eee; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 13px; }
        .readonly { background: #e9ecef; border: none; text-align: center; font-weight: bold; width: 60px; }
        .btn-action { padding: 12px; border-radius: 8px; border: none; color: white; cursor: pointer; width: 100%; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="tabAtt" onclick="switchTab('att')">تسجيل الحضور</button>
            <button class="tab-btn" id="tabGrd" onclick="switchTab('grd')">إدخال الدرجات</button>
        </div>

        <!-- قسم الحضور -->
        <div id="sectionAtt">
            <h3>تسجيل الحضور</h3>
            <div class="controls">
                <input type="date" id="datePicker">
                <input type="text" id="teacherName" placeholder="اسم المدرس">
                <select id="classSelect"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
                <select id="sectionSelect"><option>أ</option><option>ب</option></select>
                <button onclick="loadStudents()" class="btn-action" style="grid-column: span 2; background:#28a745;">جلب الأسماء</button>
            </div>
            <table><thead><tr><th>اسم الطالب</th><th>الحالة</th></tr></thead><tbody id="attendanceBody"></tbody></table>
            <button id="saveAttBtn" class="btn-action" style="margin-top:20px; background:#007bff; display:none;" onclick="saveAttendance()">حفظ الحضور</button>
        </div>

        <!-- قسم الدرجات -->
        <div id="sectionGrd" class="hidden">
            <h3>إدخال الدرجات</h3>
            <div class="controls">
                <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option></select>
                <select id="gSection"><option>أ</option><option>ب</option></select>
                <button onclick="loadGrades()" class="btn-action" style="grid-column: span 2; background:#007bff;">جلب الطلاب للدرجات</button>
            </div>
            <table>
                <thead><tr><th>الطالب</th><th>ش1</th><th>ش2</th><th>يومي</th><th>نصف س</th><th>م.شهري</th><th>م.فصل</th><th>سعي</th></tr></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn-action" style="margin-top:20px; background:#28a745;" onclick="saveGrades()">حفظ الدرجات</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function switchTab(t) {
            document.getElementById('sectionAtt').classList.toggle('hidden', t !== 'att');
            document.getElementById('sectionGrd').classList.toggle('hidden', t !== 'grd');
            document.getElementById('tabAtt').classList.toggle('active', t === 'att');
            document.getElementById('tabGrd').classList.toggle('active', t === 'grd');
        }

        // --- منطق الدرجات ---
        function calculateGrades(row) {
            const sh1 = parseFloat(row.querySelector('.sh1').value) || 0;
            const sh2 = parseFloat(row.querySelector('.sh2').value) || 0;
            const day = parseFloat(row.querySelector('.day').value) || 0;
            const mid = parseFloat(row.querySelector('.mid').value) || 0;

            // استخدام Math.ceil للتقريب للأعلى كما اتفقنا
            const avgMonthly = Math.ceil((sh1 + sh2) / 2);
            const avgTerm = Math.ceil((avgMonthly + day) / 2);
            const yearly = Math.ceil((avgTerm + mid) / 2);

            row.querySelector('.avgMonthly').value = avgMonthly;
            row.querySelector('.avgTerm').value = avgTerm;
            row.querySelector('.yearly').value = yearly;
        }

        function loadGrades() {
            const body = document.getElementById('gradesBody'); body.innerHTML = "";
            db.collection("students").where("class", "==", document.getElementById('gClass').value).get().then(snap => {
                snap.forEach(s => {
                    body.innerHTML += `<tr>
                        <td>${s.data().name}</td>
                        <td><input type="number" class="sh1" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="sh2" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="day" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="mid" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="avgMonthly readonly" readonly></td>
                        <td><input type="number" class="avgTerm readonly" readonly></td>
                        <td><input type="number" class="yearly readonly" readonly></td>
                    </tr>`;
                });
            });
        }

        function saveGrades() {
            const docId = `${document.getElementById('gClass').value}_${document.getElementById('gSection').value}`;
            const gradesData = {};
            document.querySelectorAll('#gradesBody tr').forEach(row => {
                const name = row.cells[0].innerText;
                gradesData[name] = { 
                    sh1: row.querySelector('.sh1').value, 
                    yearly: row.querySelector('.yearly').value 
                };
            });
            db.collection("grades").doc(docId).set({ data: gradesData }).then(() => alert("✅ تم حفظ الدرجات"));
        }
        
        // --- (بقية دوال الحضور الأصلية تضاف هنا كما كانت في كودك) ---
        window.onload = () => { document.getElementById('datePicker').valueAsDate = new Date(); };
    </script>
</body>
</html>
