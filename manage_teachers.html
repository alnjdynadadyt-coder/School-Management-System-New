<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة صلاحيات المدرسين</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>إضافة مدرس جديد</h2>
        <input type="text" id="tName" placeholder="اسم المدرس">
        <input type="text" id="tSub" placeholder="المادة">
        <input type="text" id="tClass" placeholder="الصف">
        <input type="text" id="tSec" placeholder="الشعبة">
        <button onclick="addTeacher()">إضافة الصلاحية</button>

        <table>
            <thead><tr><th>المدرس</th><th>المادة</th><th>الصف</th><th>الشعبة</th><th>حذف</th></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>

    <script>
        // ضع هنا نفس كود Firebase الخاص بك
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function addTeacher() {
            const name = document.getElementById('tName').value;
            db.collection("teachers_permissions").add({
                name: name,
                subject: document.getElementById('tSub').value,
                class: document.getElementById('tClass').value,
                section: document.getElementById('tSec').value
            }).then(() => { alert("تمت الإضافة!"); location.reload(); });
        }

        db.collection("teachers_permissions").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                html += `<tr><td>${doc.data().name}</td><td>${doc.data().subject}</td><td>${doc.data().class}</td><td>${doc.data().section}</td>
                <td><button style="background:red" onclick="db.collection('teachers_permissions').doc('${doc.id}').delete()">حذف</button></td></tr>`;
            });
            document.getElementById('tBody').innerHTML = html;
        });
    </script>
</body>
</html>
