<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة صلاحيات المدرسين</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>إدارة صلاحيات المدرسين</h2>
        <input type="text" id="tName" placeholder="اسم المدرس">
        
        <select id="tSub">
            <option value="">اختر المادة</option>
            <option value="الإسلامية">الإسلامية</option>
            <option value="العربي">العربي</option>
            <option value="الإنكليزي">الإنكليزي</option>
            <option value="الرياضيات">الرياضيات</option>
            <option value="الفيزياء">الفيزياء</option>
            <option value="الكيمياء">الكيمياء</option>
            <option value="الأحياء">الأحياء</option>
            <option value="التاريخ">التاريخ</option>
            <option value="الجغرافية">الجغرافية</option>
            <option value="الاقتصاد">الاقتصاد</option>
            <option value="علم النفس">علم النفس</option>
            <option value="الحاسوب">الحاسوب</option>
            <option value="الاجتماع">الاجتماع</option>
            <option value="الجرائم">الجرائم</option>
            <option value="الرياضة">الرياضة</option>
            <option value="الفنية">الفنية</option>
        </select>

        <select id="tClass">
            <option value="">اختر الصف</option>
            <option value="الرابع العلمي">الرابع العلمي</option>
            <option value="الخامس العلمي">الخامس العلمي</option>
            <option value="السادس العلمي">السادس العلمي</option>
            <option value="الرابع الأدبي">الرابع الأدبي</option>
            <option value="الخامس الأدبي">الخامس الأدبي</option>
            <option value="السادس الأدبي">السادس الأدبي</option>
        </select>

        <select id="tSec">
            <option value="">اختر الشعبة</option>
            <option value="أ">أ</option>
            <option value="ب">ب</option>
            <option value="ج">ج</option>
            <option value="د">د</option>
            <option value="هـ">هـ</option>
            <option value="و">و</option>
            <option value="ز">ز</option>
        </select>

        <button onclick="addPermission()">حفظ الصلاحية</button>

        <table>
            <thead><tr><th>المدرس</th><th>المادة</th><th>الصف</th><th>الشعبة</th><th>حذف</th></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function addPermission() {
            const data = {
                name: document.getElementById('tName').value,
                subject: document.getElementById('tSub').value,
                class: document.getElementById('tClass').value,
                section: document.getElementById('tSec').value
            };
            if(!data.name || !data.subject || !data.class || !data.section) { alert("يرجى ملء جميع الحقول"); return; }
            db.collection("teachers_permissions").add(data).then(() => location.reload());
        }

        db.collection("teachers_permissions").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                html += `<tr><td>${d.name}</td><td>${d.subject}</td><td>${d.class}</td><td>${d.section}</td>
                <td><button style="background:red" onclick="db.collection('teachers_permissions').doc('${doc.id}').delete()">حذف</button></td></tr>`;
            });
            document.getElementById('tBody').innerHTML = html;
        });
    </script>
</body>
</html>
