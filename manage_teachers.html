<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة صلاحيات المدرسين</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .back-btn { display: inline-block; margin-bottom: 15px; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← العودة للرئيسية</a>
        <h2>إدارة صلاحيات المدرسين</h2>
        
        <input type="text" id="tName" placeholder="اسم المدرس">
        <input type="text" id="tPass" placeholder="الرقم السري للمدرس">
        
        <select id="tSub">
            <option value="">اختر المادة</option>
            <option value="الإسلامية">الإسلامية</option>
            <option value="العربي">العربي</option>
            <option value="الإنكليزي">الإنكليزي</option>
            <option value="الرياضيات">الرياضيات</option>
            <option value="الفيزياء">الفيزياء</option>
            <option value="الكيمياء">الكيمياء</option>
            <option value="الأحياء">الأحياء</option>
            <option value="التاريخ">التاريخ</option>
            <option value="الجغرافية">الجغرافية</option>
            <option value="الاقتصاد">الاقتصاد</option>
            <option value="علم النفس">علم النفس</option>
            <option value="الحاسوب">الحاسوب</option>
            <option value="الاجتماع">الاجتماع</option>
            <option value="الجرائم">الجرائم</option>
            <option value="الرياضة">الرياضة</option>
            <option value="الفنية">الفنية</option>
        </select>

        <select id="tClass">
            <option value="">اختر الصف</option>
            <option value="الرابع العلمي">الرابع العلمي</option>
            <option value="الخامس العلمي">الخامس العلمي</option>
            <option value="السادس العلمي">السادس العلمي</option>
            <option value="الرابع الأدبي">الرابع الأدبي</option>
            <option value="الخامس الأدبي">الخامس الأدبي</option>
            <option value="السادس الأدبي">السادس الأدبي</option>
        </select>

        <div style="text-align: right; border: 1px solid #ccc; padding: 10px; margin: 8px 0; border-radius: 5px;">
    <label>اختر الشعب:</label><br>
    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px;">
        <label><input type="checkbox" name="sec" value="أ"> أ</label>
        <label><input type="checkbox" name="sec" value="ب"> ب</label>
        <label><input type="checkbox" name="sec" value="ج"> ج</label>
        <label><input type="checkbox" name="sec" value="د"> د</label>
        <label><input type="checkbox" name="sec" value="هـ"> هـ</label>
        <label><input type="checkbox" name="sec" value="و"> و</label>
        <label><input type="checkbox" name="sec" value="ز"> ز</label>
    </div>
</div>

        <button onclick="addPermission()">حفظ الصلاحية</button>

        <table>
            <thead><tr><th>المدرس</th><th>الرقم السري</th><th>المادة</th><th>الصف والشعبة</th><th>إجراء</th></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function addPermission() {
            const name = document.getElementById('tName').value;
            const password = document.getElementById('tPass').value;
            const subject = document.getElementById('tSub').value;
            const className = document.getElementById('tClass').value;
            const selectedSections = [];
            document.querySelectorAll('input[name="sec"]:checked').forEach(cb => selectedSections.push(cb.value));

            if(!name || !password || !subject || !className || selectedSections.length === 0) 
                return alert("يرجى ملء جميع الحقول واختيار شعبة واحدة على الأقل");

            selectedSections.forEach(sec => {
                db.collection("teachers_permissions").add({
                    name: name,
                    password: password,
                    subject: subject,
                    class: className,
                    section: sec
                });
            });
            alert("تم حفظ الصلاحيات بنجاح!");
            location.reload();
        }

        db.collection("teachers_permissions").onSnapshot(snap => {
            let teachersData = {};
            snap.forEach(doc => {
                let d = doc.data();
                if (!teachersData[d.name]) teachersData[d.name] = { password: d.password, subject: d.subject, classes: [], ids: [] };
                teachersData[d.name].classes.push(`${d.class} (${d.section})`);
                teachersData[d.name].ids.push(doc.id);
            });

            let html = "";
            for (let name in teachersData) {
                html += `<tr><td>${name}</td><td>${teachersData[name].password}</td><td>${teachersData[name].subject}</td><td>${teachersData[name].classes.join("، ")}</td>
                <td><button style="background:red; border:none; color:white; padding:5px; border-radius:3px;" onclick="deleteTeacher('${teachersData[name].ids.join(',')}')">حذف الكل</button></td></tr>`;
            }
            document.getElementById('tBody').innerHTML = html;
        });

        function deleteTeacher(ids) {
            ids.split(',').forEach(id => db.collection("teachers_permissions").doc(id).delete());
        }
    </script>
</body>
</html>
