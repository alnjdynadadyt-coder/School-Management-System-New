<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة حذف الدرجات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f2; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; border: 2px solid #dc3545; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; }
        .btn-delete { background: #dc3545; color: white; cursor: pointer; border: none; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" style="background:#6c757d; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-bottom:15px;">🔙 العودة</button>
        <h2>⚠️ لوحة التحكم بحذف الدرجات</h2>
        
        <div class="controls">
            <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option><option>الرابع الأدبي</option><option>الخامس الأدبي</option><option>السادس الأدبي</option></select>
            <select id="gSection"><option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option></select>
            <input type="text" id="subject" placeholder="اسم المادة" list="subs" onchange="updateOptions()">
            <datalist id="subs"><option value="الإسلامية"><option value="العربي"><option value="الإنكليزي"><option value="الرياضيات"><option value="الفيزياء"><option value="الكيمياء"><option value="الأحياء"><option value="التاريخ"><option value="الجغرافية"><option value="الاقتصاد"><option value="الحاسوب"><option value="الاجتماع"><option value="الجرائم"><option value="الرياضة"><option value="الفنية"></datalist>
            
            <select id="gradeType"></select>
            <button onclick="loadStudentsForDelete()" style="background:#007bff; color:white; grid-column: span 2;">جلب الطلاب</button>
        </div>

        <button class="btn-delete" onclick="deleteAllStudents()" style="background: #c82333; width: 100%;">حذف هذا النوع لجميع طلاب الصف</button>

        <table id="deleteTable">
            <thead><tr><th>اسم الطالب</th><th>الإجراء</th></tr></thead>
            <tbody id="deleteBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function updateOptions() {
            const sub = document.getElementById('subject').value;
            const select = document.getElementById('gradeType');
            select.innerHTML = "";
            const isSpecial = (sub === "الإنكليزي" || sub === "الحاسوب");
            const options = isSpecial ? 
                [ {v:0, t:"ش1 (ف1)"}, {v:1, t:"يومي (ف1)"}, {v:3, t:"ش2 (ف1)"}, {v:4, t:"يومي (ف1)"}, {v:6, t:"فصل1"}, {v:7, t:"نصف السنة"}, {v:8, t:"ش1 (ف2)"}, {v:9, t:"يومي (ف2)"}, {v:11, t:"ش2 (ف2)"}, {v:12, t:"يومي (ف2)"}, {v:14, t:"فصل2"}, {v:15, t:"السعي"}] :
                [ {v:0, t:"ش1 (ف1)"}, {v:1, t:"ش2 (ف1)"}, {v:2, t:"م.ش (ف1)"}, {v:3, t:"يومي (ف1)"}, {v:4, t:"فصل1"}, {v:6, t:"نصف السنة"}, {v:8, t:"ش1 (ف2)"}, {v:9, t:"م.ش (ف2)"}, {v:10, t:"يومي (ف2)"}, {v:11, t:"فصل2"}, {v:12, t:"السعي"}];
            options.forEach(opt => select.innerHTML += `<option value="${opt.v}">${opt.t}</option>`);
        }

        async function loadStudentsForDelete() {
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            const sub = document.getElementById('subject').value;
            const body = document.getElementById('deleteBody');
            body.innerHTML = "";
            const doc = await db.collection("grades").doc(`${cls}_${sec}_${sub}`).get();
            if(!doc.exists) { alert("لا توجد بيانات لهذا الصف والمادة!"); return; }
            const data = doc.data();
            for (let studentName in data) {
                body.innerHTML += `<tr><td>${studentName}</td><td><button onclick="deleteSingle('${studentName}')" style="background:#dc3545; color:white; border:none; padding:5px 10px; cursor:pointer;">حذف</button></td></tr>`;
            }
        }

        async function performDelete(studentName, isAll) {
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            const sub = document.getElementById('subject').value;
            const typeIndex = parseInt(document.getElementById('gradeType').value);
            const docRef = db.collection("grades").doc(`${cls}_${sec}_${sub}`);
            try {
                const doc = await docRef.get();
                let data = doc.data();
                if(isAll) { for(let s in data) { data[s][typeIndex] = ""; } } 
                else { data[studentName][typeIndex] = ""; }
                await docRef.set(data);
                alert("✅ تمت العملية بنجاح!");
                loadStudentsForDelete();
            } catch (error) { alert("❌ خطأ: " + error.message); }
        }

        async function deleteSingle(studentName) { if(confirm("⚠️ تأكيد الحذف؟")) performDelete(studentName, false); }
        async function deleteAllStudents() { if(confirm("⚠️ تحذير: سيتم حذف البيانات للجميع، هل أنت متأكد؟")) performDelete(null, true); }
        updateOptions(); // تهيئة الخيارات عند التحميل
    </script>
</body>
</html>
