<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة حذف الدرجات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f2; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; border: 2px solid #dc3545; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-delete { background: #dc3545; color: white; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚠️ لوحة التحكم بحذف الدرجات</h2>
        <div class="controls">
            <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
            <select id="gSection"><option>أ</option><option>ب</option><option>ج</option></select>
            <input type="text" id="subject" placeholder="اسم المادة">
            <select id="gradeType">
                <option value="0">ش1</option><option value="1">ش2</option>
                <option value="4">فصل1</option><option value="6">نصف السنة</option>
                <option value="15">السعي</option>
            </select>
            <button onclick="loadStudentsForDelete()">جلب الطلاب</button>
        </div>
        <table id="deleteTable">
            <thead><tr><th>اسم الطالب</th><th>الإجراء</th></tr></thead>
            <tbody id="deleteBody"></tbody>
        </table>
        <button class="btn-delete" style="width: 100%; margin-top: 20px;" onclick="deleteAllSelectedType()">حذف هذا النوع للجميع</button>
    </div>

    <script>

        const db = firebase.firestore();

        async function loadStudentsForDelete() {
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            const sub = document.getElementById('subject').value;
            const body = document.getElementById('deleteBody');
            body.innerHTML = "";

            const snap = await db.collection("students").where("class", "==", cls).get();
            snap.forEach(s => {
                if(s.data().section == sec) {
                    body.innerHTML += `<tr><td>${s.data().name}</td><td><button onclick="deleteSingle('${s.data().name}')">حذف</button></td></tr>`;
                }
            });
        }

        }
    </script>
</body>
</html>
