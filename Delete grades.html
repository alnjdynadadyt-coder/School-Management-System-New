<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة أرشفة وحذف الدرجات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f2; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; border: 2px solid #28a745; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        .btn-all { background: #dc3545 !important; color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.history.back()" style="background:#6c757d; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-bottom:15px;">🔙 العودة</button>
        <h2>📦 لوحة الأرشفة والتصفير الشامل</h2>
        
        <div class="controls">
            <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option><option>الرابع الأدبي</option><option>الخامس الأدبي</option><option>السادس الأدبي</option></select>
            <select id="gSection"><option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option></select>
            <input type="text" id="subject" placeholder="اسم المادة" list="subs">
            <datalist id="subs"><option value="الإسلامية"><option value="العربي"><option value="الإنكليزي"><option value="الرياضيات"><option value="الفيزياء"><option value="الكيمياء"><option value="الأحياء"><option value="التاريخ"><option value="الجغرافية"><option value="الاقتصاد"><option value="الحاسوب"></datalist>
            <button onclick="loadStudentsForDelete()" style="background:#007bff; color:white; grid-column: span 2;">جلب جميع الطلاب</button>
        </div>

        <input type="text" id="searchInput" placeholder="🔍 ابحث عن اسم الطالب..." onkeyup="filterTable()" style="margin-bottom: 15px; border: 2px solid #007bff;">

        <div id="bulkAction" style="display:none;">
            <button class="btn-all" onclick="archiveAll()" style="width:100%; padding:15px; border:none; border-radius:5px; cursor:pointer;">⚠️ أرشفة وتصفير جميع الطلاب في هذا الصف</button>
        </div>

        <table id="deleteTable">
            <thead><tr><th>اسم الطالب</th><th>الإجراء</th></tr></thead>
            <tbody id="deleteBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadStudentsForDelete() {
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            const sub = document.getElementById('subject').value;
            const body = document.getElementById('deleteBody');
            body.innerHTML = "";
            
            const doc = await db.collection("grades").doc(`${cls}_${sec}_${sub}`).get();
            if(!doc.exists) { alert("لا توجد بيانات لهذا الصف والمادة!"); document.getElementById('bulkAction').style.display = 'none'; return; }
            
            document.getElementById('bulkAction').style.display = 'block';
            const data = doc.data();
            
            // ترتيب الأسماء أبجدياً
            const studentNames = Object.keys(data).filter(name => name !== "teacher").sort();
            
            for (let studentName of studentNames) {
                body.innerHTML += `<tr class="student-row">
                    <td>${studentName}</td>
                    <td><button onclick="archiveAndClear('${studentName}')" style="background:#28a745; color:white; border:none; padding:8px 15px; cursor:pointer; border-radius:4px;">أرشفة وتصفير</button></td>
                </tr>`;
            }
        }

        // دالة البحث
        function filterTable() {
            const query = document.getElementById('searchInput').value;
            const rows = document.querySelectorAll('.student-row');
            rows.forEach(row => {
                const name = row.cells[0].innerText;
                row.style.display = name.includes(query) ? "" : "none";
            });
        }

        async function archiveAndClear(studentName) {
            if (!confirm(`⚠️ تحذير: سيتم نقل بيانات ${studentName} للأرشيف وتصفير درجاته. هل أنت متأكد؟`)) return;
            await processStudent(studentName, false);
        }

        async function archiveAll() {
            if (!confirm("🚨 تحذير خطير: سيتم أرشفة وتصفير بيانات كـافـة الطلاب في القائمة الحالية. هل أنت متأكد؟")) return;
            const rows = document.querySelectorAll('.student-row');
            for (let row of rows) {
                if(row.style.display !== "none") {
                    const name = row.cells[0].innerText;
                    await processStudent(name, true);
                }
            }
            alert("✅ تم تنفيذ العملية بنجاح!");
            loadStudentsForDelete();
        }

        async function processStudent(studentName, isBulk) {
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            const sub = document.getElementById('subject').value;
            const docRef = db.collection("grades").doc(`${cls}_${sec}_${sub}`);
            try {
                const doc = await docRef.get();
                let data = doc.data();
                let studentData = data[studentName];
                await db.collection("archived_grades").add({
                    studentName, subject: sub, class: cls, section: sec, data: studentData, timestamp: new Date().toISOString()
                });
                data[studentName] = studentData.map(() => "");
                await docRef.set(data);
                if(!isBulk) { alert("✅ تمت العملية بنجاح!"); loadStudentsForDelete(); }
            } catch (error) { alert("❌ خطأ: " + error.message); }
        }
    </script>
</body>
</html>
