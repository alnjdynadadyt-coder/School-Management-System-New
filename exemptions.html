<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الإعفاء العام - الإصدار المطور</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #2980b9;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --light-bg: #ecf0f1;
            --gold-color: #d4ac0d;
        }

        body { font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-bg); margin: 0; padding: 20px; color: var(--primary-color); }
        .main-wrapper { max-width: 1350px; margin: auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .back-link { text-decoration: none; color: #7f8c8d; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .back-link:hover { color: var(--accent-color); }

        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 15px; background: #fdfefe; padding: 20px; border-radius: 12px; border: 1px solid #dfe6e9; margin-bottom: 25px; }
        .control-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 13px; }
        .control-group select, .control-group input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 8px; font-size: 14px; outline: none; }
        
        .btn-action { background: var(--accent-color); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; width: 100%; }
        .btn-action:hover { background: #1f618d; }

        .sheet-container { margin-top: 20px; overflow-x: auto; border: 1px solid #bdc3c7; border-radius: 10px; }
        .sheet-title { text-align: center; background: var(--primary-color); color: #fff; padding: 12px; font-size: 17px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th, td { border: 1px solid #dcdde1; padding: 8px 6px; white-space: nowrap; }
        th { background-color: #34495e; color: #fff; font-weight: 600; }
        
        tr.student-row:hover { background-color: #f1f2f6; cursor: pointer; }
        .status-badge-yes { background-color: #d4edda; color: #155724; font-weight: bold; }
        .status-badge-no { background-color: #f8d7da; color: #721c24; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: #fff; width: 95%; max-width: 750px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-height: 95vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; left: 20px; top: 15px; font-size: 26px; font-weight: bold; cursor: pointer; color: #e74c3c; }

        .global-print-btn { background: #27ae60; margin-top: 20px; display: none; }
        .global-print-btn:hover { background: #219653; }

        /* إعدادات الطباعة المخصصة */
        @media print {
            @page { size: A4 landscape; margin: 8mm; } /* طباعة السجل الكلي بالعرض لتناسب الجداول الكبيرة */
            body { background: #fff; padding: 0; font-size: 11px; }
            .top-nav, .control-panel, .global-print-btn, .close-modal, .btn-action { display: none !important; }
            
            /* وضع طباعة الشهادة الفردية */
            body.print-mode-single .main-wrapper { display: none !important; }
            body.print-mode-single .modal-overlay { display: flex !important; position: static !important; background: none !important; }
            body.print-mode-single .modal-box { box-shadow: none !important; width: 100% !important; max-width: 100% !important; padding: 5px !important; border: 3px double #2c3e50 !important; border-radius: 8px !important; margin: 0 !important; }
            
            /* وضع طباعة السجل الكلي */
            body:not(.print-mode-single) .modal-overlay { display: none !important; }
            body:not(.print-mode-single) .main-wrapper { box-shadow: none !important; padding: 0 !important; max-width: 100% !important; }
            body:not(.print-mode-single) .sheet-container { border: none !important; overflow: visible !important; }
            
            table { font-size: 11px; width: 100% !important; }
            th, td { padding: 5px 4px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-nav">
        <a href="index.html" class="back-link">⬅️ العودة للرئيسية</a>
        <h2 style="margin:0; font-size: 20px; color: var(--primary-color);">🌟 نظام استخراج الإعفاء العام (الإصدار المطور)</h2>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label>اختر الصف الدراسي:</label>
            <select id="boxClass">
                <option>الرابع العلمي</option>
                <option>الخامس العلمي</option>
                <option>الرابع الأدبي</option>
                <option>الخامس الأدبي</option>
            </select>
        </div>
        <div class="control-group">
            <label>اختر الشعبة:</label>
            <select id="boxSection">
                <option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option>
            </select>
        </div>
        <div class="control-group">
            <label>الحد الأدنى للمعدل العام:</label>
            <input type="number" id="boxMinAvg" value="85" min="50" max="100">
        </div>
        <div class="control-group">
            <label>أقل درجة مسموحة بالمادة:</label>
            <input type="number" id="boxMinSub" value="75" min="50" max="100">
        </div>
        <div class="control-group" style="grid-column: span 2; display: flex; align-items: flex-end;">
            <button class="btn-action" onclick="initSystem()">⚡ توليد وعرض سجل النتائج</button>
        </div>
    </div>

    <div id="dynamicOutputArea"></div>
    <button class="btn-action global-print-btn" id="printFullSheetBtn" onclick="window.print()">🖨️ طباعة السجل الكلي</button>
</div>

<div class="modal-overlay" id="studentModalOverlay">
    <div class="modal-box" id="studentModalContentBox">
        <span class="close-modal" onclick="closeStudentModal()">&times;</span>
        <div id="studentModalInnerHtml"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw",
        authDomain: "school-2-2026.firebaseapp.com",
        projectId: "school-2-2026",
        storageBucket: "school-2-2026.firebasestorage.app",
        messagingSenderId: "283472829932",
        appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9"
    };
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const FIXED_SUBJECT_ORDER = [
        "الاسلامية", "الإسلامية", "العربي", "الانكليزي", "الإنكليزي", 
        "الرياضيات", "الحاسوب", "الاحياء", "الأحياء", "الكيمياء", 
        "الفيزياء", "الجرائم", "الرياضة", "الفنية"
    ];

    let cachedMasterData = {
        students: [],
        gradesMap: {},
        subjectsList: [],
        className: "",
        sectionName: "",
        minAvgLimit: 85,
        minSubLimit: 75
    };

    function parseSubjectDetails(subName, rawData) {
        let f1 = '-', mid = '-', f2 = '-', finalScore = 0;
        if (!rawData) return { f1, mid, f2, finalScore };

        let isExtendedSubject = subName.includes("الانكليزي") || subName.includes("الإنكليزي") || subName.includes("الحاسوب");

        if (Array.isArray(rawData)) {
            if (isExtendedSubject) {
                f1 = rawData[6] ?? '-';
                mid = rawData[7] ?? '-';
                f2 = rawData[14] ?? '-';
                finalScore = Number(rawData[15]) || 0;
            } else {
                f1 = rawData[4] ?? (rawData[2] ?? '-');
                mid = rawData[5] ?? '-';
                f2 = rawData[10] ?? '-';
                finalScore = Number(rawData[11]) || 0;
            }
        } else {
            finalScore = Number(rawData) || 0;
        }
        return { f1, mid, f2, finalScore };
    }

    async function initSystem() {
        const className = document.getElementById('boxClass').value;
        const sectionName = document.getElementById('boxSection').value;
        const minAvg = parseFloat(document.getElementById('boxMinAvg').value) || 85;
        const minSub = parseFloat(document.getElementById('boxMinSub').value) || 75;
        const outputArea = document.getElementById('dynamicOutputArea');

        outputArea.innerHTML = "<p style='text-align:center; padding:20px; font-weight:bold; color:#7f8c8d;'>🔄 جاري سحب ومطابقة البيانات من الخادم...</p>";
        document.getElementById('printFullSheetBtn').style.display = "none";

        try {
            const studentSnapshot = await db.collection("students").where("class", "==", className).get();
            let studentNames = [];
            studentSnapshot.forEach(doc => {
                let data = doc.data();
                if(data.section == sectionName) {
                    studentNames.push(data.name);
                }
            });

            if(studentNames.length === 0) {
                outputArea.innerHTML = `<p style='text-align:center; color:var(--danger-color); font-weight:bold;'>⚠️ لا يوجد طلاب مسجلين في ${className} - الشعبة (${sectionName}).</p>`;
                return;
            }
            studentNames.sort((a, b) => a.localeCompare(b, 'ar'));

            const gradesSnapshot = await db.collection("grades").get();
            let rawSubSet = new Set();
            let gradesMap = {};

            gradesSnapshot.forEach(doc => {
                let docId = doc.id;
                let data = doc.data();
                if(docId.includes(className) && docId.includes(sectionName)) {
                    let sub = docId.split('_').slice(2).join('_') || data.subject || "";
                    sub = sub.replace(/سعي/g, "").trim();
                    if(!sub || sub === "مادة") return;

                    rawSubSet.add(sub);

                    for(let key in data) {
                        if(!["class", "section", "subject", "teacher"].includes(key)) {
                            if(!gradesMap[key]) gradesMap[key] = {};
                            gradesMap[key][sub] = data[key];
                        }
                    }
                }
            });

            let activeSubjects = [];
            FIXED_SUBJECT_ORDER.forEach(target => {
                let found = Array.from(rawSubSet).find(item => item === target || item.includes(target) || target.includes(item));
                if(found && !activeSubjects.includes(found)) {
                    activeSubjects.push(found);
                }
            });
            rawSubSet.forEach(item => {
                if(!activeSubjects.includes(item)) activeSubjects.push(item);
            });

            if(activeSubjects.length === 0) {
                outputArea.innerHTML = `<p style='text-align:center; color:var(--danger-color); font-weight:bold;'>⚠️ لا توجد سجلات درجات مرصودة لهذه الشعبة حتى الآن.</p>`;
                return;
            }

            cachedMasterData = {
                students: studentNames,
                gradesMap: gradesMap,
                subjectsList: activeSubjects,
                className: className,
                sectionName: sectionName,
                minAvgLimit: minAvg,
                minSubLimit: minSub
            };

            buildMasterTableUI();

        } catch (error) {
            outputArea.innerHTML = `<p style='text-align:center; color:var(--danger-color);'>❌ حدث خطأ تقني: ${error.message}</p>`;
        }
    }

    function buildMasterTableUI() {
        const outputArea = document.getElementById('dynamicOutputArea');
        let { students, gradesMap, subjectsList, className, sectionName, minAvgLimit, minSubLimit } = cachedMasterData;

        let thsHtml = "";
        subjectsList.forEach(sub => { thsHtml += `<th>${sub}</th>`; });

        let rowsHtml = "";
        let counter = 0;

        students.forEach(student => {
            counter++;
            let sGrades = gradesMap[student] || {};
            let sumMarks = 0;
            let countValidSubs = 0;
            let lowestScore = 100;
            let isPassRules = true;
            let cellsHtml = "";

            subjectsList.forEach(sub => {
                let rawVal = sGrades[sub];
                if(!rawVal) {
                    let altKey = Object.keys(sGrades).find(k => k.includes(sub));
                    if(altKey) rawVal = sGrades[altKey];
                }

                let parsed = parseSubjectDetails(sub, rawVal);
                let score = parsed.finalScore;

                if(rawVal && score > 0) {
                    sumMarks += score;
                    countValidSubs++;
                    if(score < lowestScore) lowestScore = score;
                    if(score < minSubLimit) isPassRules = false;
                }

                let redText = (score < 50 && score > 0) ? "color: red; font-weight: bold;" : "";
                cellsHtml += `<td style="${redText}">${score > 0 ? score : '-'}</td>`;
            });

            let averageVal = countValidSubs > 0 ? (sumMarks / countValidSubs) : 0;
            let isQualified = (countValidSubs > 0 && isPassRules && averageVal >= minAvgLimit);

            let statusClass = isQualified ? "status-badge-yes" : "status-badge-no";
            let statusText = "";

            if (isQualified) {
                statusText = "مشمول بالإعفاء (انقر للاستعراض)";
            } else {
                if (countValidSubs === 0) statusText = "لا توجد درجات";
                else if (averageVal < minAvgLimit && lowestScore >= minSubLimit) statusText = "غير مشمول (المعدل)";
                else statusText = "غير مشمول (درجة مادة)";
            }

            let totalColContent = isQualified ? `<td style="font-weight:bold; background:#e8f8f5;">${sumMarks}</td>` : `<td style="color:#b2babb; font-weight:bold;">-</td>`;
            let avgColContent = isQualified ? `<td style="font-weight:bold; background:#e8f8f5;">${averageVal.toFixed(2)}</td>` : `<td style="color:#b2babb; font-weight:bold;">-</td>`;
            let clickEventAttr = isQualified ? `onclick="openIndividualStudentModal('${student}')" title="انقر لعرض الاستعراض الفردي الشامل"` : "";

            rowsHtml += `
                <tr class="student-row" ${clickEventAttr}>
                    <td>${counter}</td>
                    <td style="text-align: right; font-weight: bold;">${student}</td>
                    ${cellsHtml}
                    ${totalColContent}
                    ${avgColContent}
                    <td class="${statusClass}">${statusText}</td>
                </tr>
            `;
        });

        outputArea.innerHTML = `
            <div class="sheet-container">
                <div class="sheet-title">سجل درجات السعي والمعدلات النهائية - ${className} (${sectionName})</div>
                <table>
                    <thead>
                        <tr>
                            <th>ت</th>
                            <th>اسم الطالب</th>
                            ${thsHtml}
                            <th>المجموع الكلي</th>
                            <th>المعدل العام</th>
                            <th>حالة الإعفاء</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
            </div>
        `;
        document.getElementById('printFullSheetBtn').style.display = "block";
    }

    function openIndividualStudentModal(studentName) {
        let sGrades = cachedMasterData.gradesMap[studentName] || {};
        let subjectsList = cachedMasterData.subjectsList;
        let innerHtmlContainer = document.getElementById('studentModalInnerHtml');

        let rowsBuilder = "";
        let totalSum = 0;
        let count = 0;

        subjectsList.forEach(sub => {
            let rawVal = sGrades[sub];
            if(!rawVal) {
                let altKey = Object.keys(sGrades).find(k => k.includes(sub));
                if(altKey) rawVal = sGrades[altKey];
            }

            let parsed = parseSubjectDetails(sub, rawVal);
            totalSum += parsed.finalScore;
            count++;

            rowsBuilder += `
                <tr>
                    <td style="text-align:right; font-weight:bold; color:#1b4f72;">📚 ${sub}</td>
                    <td style="color: #566573;">${parsed.f1}</td>
                    <td style="color: #566573;">${parsed.mid}</td>
                    <td style="color: #566573;">${parsed.f2}</td>
                    <td style="font-weight:bold; background:#ebf5fb; color:#154360; font-size:13px;">${parsed.finalScore > 0 ? parsed.finalScore : '-'}</td>
                </tr>
            `;
        });

        let finalAverage = count > 0 ? (totalSum / count).toFixed(2) : 0;

        innerHtmlContainer.innerHTML = `
            <span class="close-modal" onclick="closeStudentModal()">&times;</span>
            
            <div style="background: linear-gradient(135deg, #fef9e7, #fcf3cf); padding: 12px 15px; border-radius: 10px; border: 2px solid #f39c12; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.15);">
                <h3 style="margin: 0 0 5px 0; color: #b7950b; font-size: 16px;">✨ شهادة التميز والاستحقاق للإعفاء العام ✨</h3>
                <p style="margin: 0; font-size: 12px; font-weight: bold; color: #7d6608; line-height: 1.5;">
                    "إلى الطالب المتألق، مبارك لك هذا التميز والنجاح الباهر. جهودك المبذولة أثمرت تفوقاً تفتخر به المدرسة، مع تمنياتنا لك دوام التألق والابداع في مسيرتك العلمية." 🌸🎓
                </p>
            </div>

            <div style="text-align:center; background: #eaf2f8; padding: 10px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #d4e6f1;">
                <h4 style="margin:0; color:var(--accent-color); font-size: 14px;">اعدادية النجدين للبنين </h4>
                <p style="margin:5px 0 0 0; font-weight:bold; font-size:13px; color:#2c3e50;">الطالب المتميز: <span style="color:#1b4f72;">${studentName}</span> &nbsp;|&nbsp; الصف: ${cachedMasterData.className} &nbsp;|&nbsp; الشعبة: (${cachedMasterData.sectionName})</p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="background: #2e4053;">المادة الدراسية</th>
                        <th style="background: #2e4053;">الفصل الأول</th>
                        <th style="background: #2e4053;">نصف السنة</th>
                        <th style="background: #2e4053;">الفصل الثاني</th>
                        <th style="background: #1f618d;">السعي السنوي</th>
                    </tr>
                </thead>
                <tbody>${rowsBuilder}</tbody>
            </table>

            <div style="margin-top: 12px; display: flex; justify-content: space-around; background: #f2f4f4; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 12px; border: 1px solid #d5dbdb;">
                <div>المجموع الكلي: <span style="color:#117a65;">${totalSum}</span></div>
                <div>المعدل العام: <span style="color:#117a65;">${finalAverage}</span></div>
                <div style="color: var(--success-color);">الحالة: مشمول بالإعفاء العام ✨</div>
            </div>

            <div style="text-align: center; margin-top: 15px;">
                <button class="btn-action" style="width: auto; padding: 10px 25px; font-size: 13px;" onclick="triggerSinglePrint()">🖨️ طباعة الشهادة الفردية المنسقة</button>
            </div>
        `;

        document.getElementById('studentModalOverlay').style.display = 'flex';
    }

    function closeStudentModal() {
        document.getElementById('studentModalOverlay').style.display = 'none';
    }

    function triggerSinglePrint() {
        document.body.classList.add('print-mode-single');
        window.print();
        document.body.classList.remove('print-mode-single');
    }

    window.onclick = function(event) {
        let overlay = document.getElementById('studentModalOverlay');
        if (event.target === overlay) {
            closeStudentModal();
        }
    }
</script>

</body>
</html>
