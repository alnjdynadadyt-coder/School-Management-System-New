<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; }
        .btns-container { display: flex; gap: 10px; grid-column: span 3; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #6f42c1; color: white; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="no-print" style="display:block; margin-bottom:15px; text-decoration:none;">⬅️ عودة للرئيسية</a>
        <h3>التقرير الشامل للطلاب</h3>
        <div class="controls">
            <select id="classSelect"><option value="">اختر الصف</option></select>
            <select id="sectionSelect"><option value="">اختر الشعبة</option></select>
            <select id="studentSelect"><option value="all">الكل</option></select>
            <input type="date" id="dateFrom">
            <input type="date" id="dateTo">
            <div class="btns-container">
                <button class="btn-action" onclick="generateReport()" style="background: #6f42c1;">عرض التقرير</button>
                <button class="btn-action no-print" onclick="window.print()" style="background: #28a745;">طباعة PDF 🖨️</button>
            </div>
        </div>
        <table>
            <thead><tr><th>اسم الطالب</th><th>أيام غياب</th><th>دروس غياب</th><th>أيام إجازة</th><th>دروس إجازة</th></tr></thead>
            <tbody id="reportBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. تحميل الصفوف عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            const classSelect = document.getElementById('classSelect');
            db.collection("students").get().then(snap => {
                let classes = new Set();
                snap.forEach(doc => { if(doc.data().class) classes.add(doc.data().class); });
                classes.forEach(c => classSelect.innerHTML += `<option value="${c}">${c}</option>`);
            });
        });

        // 2. ربط الأحداث يدوياً لضمان العمل
        document.getElementById('classSelect').addEventListener('change', function() {
            const c = this.value;
            const secSelect = document.getElementById('sectionSelect');
            secSelect.innerHTML = '<option value="">اختر الشعبة</option>';
            if(!c) return;
            db.collection("students").where("class", "==", c).get().then(snap => {
                let sections = new Set();
                snap.forEach(doc => { if(doc.data().section) sections.add(doc.data().section); });
                sections.forEach(s => secSelect.innerHTML += `<option value="${s}">${s}</option>`);
            });
        });

        document.getElementById('sectionSelect').addEventListener('change', function() {
            const c = document.getElementById('classSelect').value;
            const s = this.value;
            const stuSelect = document.getElementById('studentSelect');
            stuSelect.innerHTML = '<option value="all">الكل</option>';
            if(!s) return;
            db.collection("students").where("class", "==", c).where("section", "==", s).get().then(snap => {
                snap.forEach(doc => stuSelect.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
            });
        });

        async function generateReport() {
            const dFrom = document.getElementById('dateFrom').value;
            const dTo = document.getElementById('dateTo').value;
            const c = document.getElementById('classSelect').value;
            const s = document.getElementById('sectionSelect').value;
            const stuId = document.getElementById('studentSelect').value;

            if(!c || !s || !dFrom || !dTo) { alert("يرجى اختيار الصف والشعبة والتاريخ"); return; }

            const attendSnap = await db.collection("attendance").get();
            const stuSnap = await db.collection("students").where("class", "==", c).where("section", "==", s).get();
            
            let dataMap = {};
            stuSnap.forEach(doc => {
                if(stuId === "all" || doc.id === stuId) {
                    dataMap[doc.id] = { name: doc.data().name, abs: {}, lea: {} };
                }
            });

            attendSnap.forEach(doc => {
                const parts = doc.id.split('_');
                const d = parts[0];
                if(d >= dFrom && d <= dTo) {
                    const rowData = doc.data().data || {};
                    Object.keys(rowData).forEach(sId => {
                        if(dataMap[sId]) {
                            if(rowData[sId] === "غائب") dataMap[sId].abs[d] = (dataMap[sId].abs[d] || 0) + 1;
                            if(rowData[sId] === "مجاز") dataMap[sId].lea[d] = (dataMap[sId].lea[d] || 0) + 1;
                        }
                    });
                }
            });

            let html = "";
            for(let sId in dataMap) {
                let aD=0, aL=0, lD=0, lL=0;
                Object.values(dataMap[sId].abs).forEach(v => { aD += Math.floor(v/4); aL += (v%4); });
                Object.values(dataMap[sId].lea).forEach(v => { lD += Math.floor(v/4); lL += (v%4); });

                if(stuId !== "all" || (aD > 0 || aL > 0 || lD > 0 || lL > 0)) {
                    html += `<tr><td>${dataMap[sId].name}</td><td style="color: red; font-weight: bold;">${aD}</td><td style="color: red; font-weight: bold;">${aL}</td><td>${lD}</td><td>${lL}</td></tr>`;
                }
            }
            document.getElementById('reportBody').innerHTML = html || "<tr><td colspan='5'>لا توجد حالات غياب/إجازة</td></tr>";
        }
    </script>
</body>
</html>
