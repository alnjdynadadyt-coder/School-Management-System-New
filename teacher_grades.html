<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المدرس</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        #loginArea { text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e1e1e1; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: #0056b3; }
        
        select { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 2px solid #007bff; font-size: 16px; }
        #gradesArea { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea">
            <h2>🔐 بوابة دخول المدرس</h2>
            <input type="text" id="teacherName" placeholder="اسم المستخدم">
            <input type="password" id="teacherPass" placeholder="الرقم السري">
            <button class="btn-main" onclick="checkPermissions()">دخول</button>
        </div>
        
        <div id="gradesArea">
            <h3 id="welcomeMsg"></h3>
            <select id="allowedClasses" onchange="loadStudentGrades()">
                <option value="">اختر المادة / الصف المطلوب</option>
            </select>
            <table id="gradesTable" border="1" style="width:100%; text-align:center;">
                <thead id="headArea"></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn-main" style="margin-top:20px; background:#28a745;" onclick="saveGrades()">حفظ التغييرات</button>
            <button onclick="location.reload()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer;">تسجيل خروج</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            const pass = document.getElementById('teacherPass').value;
            let select = document.getElementById('allowedClasses');

            const snap = await db.collection("teachers_permissions")
                                 .where("name", "==", name)
                                 .where("password", "==", pass)
                                 .get();
                                 
            if (snap.empty) return alert("خطأ: اسم المستخدم أو الرقم السري غير صحيح!");
            
            snap.forEach(doc => {
                let d = doc.data();
                let opt = document.createElement('option');
                opt.value = JSON.stringify(d);
                opt.innerHTML = `${d.subject} | ${d.class} - ${d.section}`;
                select.appendChild(opt);
            });
            
            document.getElementById('welcomeMsg').innerText = "مرحباً بك: " + name;
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('gradesArea').style.display = 'block';
        }

        async function loadStudentGrades() { /* كود جلب بياناتك هنا */ }
        async function saveGrades() { /* كود الحفظ هنا */ }
    </script>
</body>
</html>
