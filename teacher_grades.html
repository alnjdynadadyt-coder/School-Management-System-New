<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المدرس</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .login-box { text-align: center; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box" id="loginArea">
            <input type="text" id="teacherName" placeholder="أدخل اسمك الكريم">
            <button class="btn" style="background:#007bff;" onclick="checkPermissions()">دخول</button>
        </div>
        <div id="controlArea" style="display:none;">
            <select id="permSelect" onchange="loadTeacherGrades()"><option>اختر المادة والصف</option></select>
        </div>
        <table id="gradesTable" style="display:none;">
            <thead id="headArea"></thead>
            <tbody id="gradesBody"></tbody>
        </table>
        <button id="saveBtn" class="btn" style="width:100%; background:#28a745; margin-top:15px; display:none;" onclick="saveTeacherGrades()">حفظ التغييرات</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentSelection = null;

        function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            db.collection("teachers_permissions").where("name", "==", name).get().then(snap => {
                const select = document.getElementById('permSelect');
                select.innerHTML = '<option>اختر المادة والصف</option>';
                snap.forEach(doc => {
                    const d = doc.data();
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify(d);
                    opt.innerText = `${d.subject} - ${d.class} (${d.section})`;
                    select.appendChild(opt);
                });
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('controlArea').style.display = 'block';
            });
        }

        async function loadTeacherGrades() {
            const val = document.getElementById('permSelect').value;
            if (val === "اختر المادة والصف") return;
            currentSelection = JSON.parse(val);
            const {class: cls, section: sec, subject: sub} = currentSelection;
            
            // نفس منطق جلب الطلاب من grades.html
            const body = document.getElementById('gradesBody');
            body.innerHTML = "";
            const snap = await db.collection("students").where("class", "==", cls).get();
            let students = [];
            snap.forEach(s => { if(s.data().section == sec) students.push(s.data()); });
            students.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

            students.forEach(s => {
                let row = `<tr><td>${s.name}</td>`;
                for(let i=0; i<12; i++) { // عدد الخانات حسب مادتك
                    row += `<td><input type="text" class="gInput" data-index="${i}"></td>`;
                }
                body.innerHTML += row + "</tr>";
            });

            // جلب الدرجات الحالية وقفل المحفوظ منها
            const doc = await db.collection("grades").doc(`${cls}_${sec}_${sub}`).get();
            if (doc.exists) {
                const data = doc.data();
                document.querySelectorAll('#gradesBody tr').forEach(row => {
                    const name = row.cells[0].innerText;
                    if (data[name]) {
                        row.querySelectorAll('.gInput').forEach((input, i) => {
                            if (data[name][i] !== "" && data[name][i] !== undefined) {
                                input.value = data[name][i];
                                input.readOnly = true; // قفل الخلية المحفوظة
                                input.style.background = "#eee";
                            }
                        });
                    }
                });
            }
            document.getElementById('gradesTable').style.display = 'table';
            document.getElementById('saveBtn').style.display = 'block';
        }

        async function saveTeacherGrades() {
            const {class: cls, section: sec, subject: sub} = currentSelection;
            const dataToSave = { teacher: document.getElementById('teacherName').value };
            document.querySelectorAll('#gradesBody tr').forEach(row => {
                dataToSave[row.cells[0].innerText] = Array.from(row.querySelectorAll('.gInput')).map(i => i.value);
            });
            await db.collection("grades").doc(`${cls}_${sec}_${sub}`).set(dataToSave, {merge: true});
            alert("تم حفظ المدخلات الجديدة بنجاح!");
        }
    </script>
</body>
</html>
