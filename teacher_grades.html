<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المدرس</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        #loginArea { max-width: 400px; margin: 50px auto; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; background: #007bff; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 3px; text-align: center; }
        .c-f1 { background-color: #fff9c4 !important; } .c-mid { background-color: #e8f5e9 !important; } 
        .c-f2 { background-color: #e3f2fd !important; } .c-final { background-color: #fce4ec !important; }
        .c-f1 input, .c-mid input, .c-f2 input, .c-final input { width: 32px !important; padding: 2px; border: 1px solid #ddd; border-radius: 3px; text-align: center; background: transparent; }
        #gradesArea { display: none; }
    </style>
</head>
<body>
    <div class="container">
                <!-- منطقة التحكم الجديدة التي ستظهر وتختفي -->
        <div id="authBar" style="margin-bottom: 20px; padding: 10px; background: #eef; border-radius: 8px;">
            <div id="loginForm">
                <input type="text" id="teacherName" placeholder="اسم المستخدم">
                <input type="password" id="teacherPass" placeholder="الرقم السري">
                <button class="btn" onclick="checkPermissions()">دخول</button>
            </div>
            <div id="teacherControls" style="display:none;">
                <h3 id="welcomeMsg" style="margin:0;"></h3>
                <select id="allowedClasses" onchange="loadSelectedGrades()"></select>
                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">خروج</button>
            </div>
        </div>

        <div id="gradesArea">
            <h3 id="welcomeMsg"></h3>
            <select id="allowedClasses" onchange="loadSelectedGrades()">
                <option value="">اختر المادة / الصف المطلوب</option>
            </select>
            <table id="gradesTable">
                <thead id="headArea"></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn" style="background:#28a745; margin-top:15px;" onclick="saveGrades()">حفظ الدرجات</button>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:10px;">تسجيل خروج</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            const pass = document.getElementById('teacherPass').value;
            let select = document.getElementById('allowedClasses');
            const snap = await db.collection("teachers_permissions").where("name", "==", name).where("password", "==", pass).get();
            if (snap.empty) return alert("خطأ في البيانات!");
            snap.forEach(doc => {
                let d = doc.data();
                let opt = document.createElement('option');
                opt.value = JSON.stringify(d);
                opt.innerHTML = `${d.subject} | ${d.class} - ${d.section}`;
                select.appendChild(opt);
            });
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('gradesArea').style.display = 'block';
        }

        async function loadSelectedGrades() {
            const data = JSON.parse(document.getElementById('allowedClasses').value);
            const sub = data.subject, cls = data.class, sec = data.section;
            const head = document.getElementById('headArea'), body = document.getElementById('gradesBody');
            body.innerHTML = "";

            if (sub === "الإنكليزي" || sub === "الحاسوب") {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="7" class="c-f1">الفصل الأول</th><th class="c-mid">ن.سنة</th><th colspan="7" class="c-f2">الفصل الثاني</th><th class="c-final">السعي</th></tr><tr><th></th><th>ش1</th><th>يومي</th><th>ش2</th><th>يومي</th><th>مج.ش1</th><th>مج.ش2</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>يومي</th><th>ش2</th><th>يومي</th><th>مج.ش1</th><th>مج.ش2</th><th>فصل2</th><th>السعي</th></tr>`;
            } else {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="5" class="c-f1">الفصل الأول</th><th class="c-mid">نصف السنة</th><th colspan="5" class="c-f2">الفصل الثاني</th><th class="c-final">السعي</th></tr><tr><th></th><th class="c-f1">ش1</th><th class="c-f1">ش2</th><th class="c-f1">م.ش</th><th class="c-f1">يومي1</th><th class="c-f1">فصل1</th><th class="c-mid">ن.سنة</th><th class="c-f2">ش1</th><th class="c-f2">ش2</th><th class="c-f2">م.ش</th><th class="c-f2">يومي2</th><th class="c-f2">فصل2</th><th class="c-final">النتيجة</th></tr>`;
            }

            const snap = await db.collection("students").where("class", "==", cls).get();
            let students = [];
            snap.forEach(s => { if(s.data().section == sec) students.push(s.data()); });
            students.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

            students.forEach(s => {
                const classes = (sub === "الإنكليزي" || sub === "الحاسوب") ? ["c-f1","c-f1","c-f1","c-f1","c-f1","c-f1","c-f1","c-mid","c-f2","c-f2","c-f2","c-f2","c-f2","c-f2","c-f2","c-final"] : ["c-f1","c-f1","c-f1","c-f1","c-f1","c-mid","c-f2","c-f2","c-f2","c-f2","c-f2","c-final"];
                let row = `<tr><td>${s.name}</td>`;
                classes.forEach(c => { row += `<td class="${c}"><input type="text"></td>`; });
                body.innerHTML += row + "</tr>";
            });

            const doc = await db.collection("grades").doc(`${cls}_${sec}_${sub}`).get();
            if (doc.exists) {
                const data = doc.data();
                document.querySelectorAll('#gradesBody tr').forEach(row => {
                    const name = row.cells[0].innerText;
                    if (data[name]) { const inputs = row.querySelectorAll('input'); data[name].forEach((val, i) => { if(inputs[i]) inputs[i].value = val; }); }
                });
            }
        }

        async function saveGrades() {
            const data = JSON.parse(document.getElementById('allowedClasses').value);
            const docRef = db.collection("grades").doc(`${data.class}_${data.section}_${data.subject}`);
            const dataToSave = { teacher: data.name };
            document.querySelectorAll('#gradesBody tr').forEach((row) => { dataToSave[row.cells[0].innerText] = Array.from(row.querySelectorAll('input')).map(i => i.value); });
            await docRef.set(dataToSave); alert("تم الحفظ!");
        }
    </script>
</body>
</html>
