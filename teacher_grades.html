<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المدرس - نظام الدرجات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        
        /* تنسيق منطقة الدخول الجديدة */
        #loginArea {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        
        /* تنسيق الجدول والدرجات */
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 3px; text-align: center; }
        .c-f1 { background-color: #fff9c4 !important; } .c-mid { background-color: #e8f5e9 !important; } 
        .c-f2 { background-color: #e3f2fd !important; } .c-final { background-color: #fce4ec !important; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; background: #007bff; }
        .back-btn { background: #6c757d; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn back-btn" onclick="window.history.back()">🔙 العودة للوحة الرئيسية</button>

        <div id="loginArea">
            <h2 style="color: #333; margin-bottom: 20px;">دخول النظام</h2>
            <input type="text" id="teacherName" placeholder="اسم المستخدم">
            <input type="password" id="teacherPass" placeholder="الرقم السري">
            <button class="btn-login" onclick="checkPermissions()">دخول</button>
        </div>
        
        <div id="gradesArea" style="display:none;">
            <h3 id="welcomeMsg"></h3>
            <select id="allowedClasses" onchange="loadStudentGrades()"><option value="">اختر الصف والمادة</option></select>
            <table id="gradesTable">
                <thead id="headArea"></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn" style="width:100%; margin-top:15px;" onclick="saveGrades()">حفظ الدرجات</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            const pass = document.getElementById('teacherPass').value;
            let select = document.getElementById('allowedClasses');
            select.innerHTML = '<option value="">اختر الصف والمادة</option>';

            if (name === "admin") { 
                const snap = await db.collection("teachers_permissions").get();
                snap.forEach(doc => {
                    let d = doc.data();
                    let opt = document.createElement('option');
                    opt.value = JSON.stringify(d);
                    opt.innerHTML = `${d.name} | ${d.subject} - ${d.class} - ${d.section}`;
                    select.appendChild(opt);
                });
                document.getElementById('welcomeMsg').innerText = "مرحباً: المدير (صلاحيات كاملة)";
            } else {
                const snap = await db.collection("teachers_permissions")
                                     .where("name", "==", name)
                                     .where("password", "==", pass)
                                     .get();
                if (snap.empty) return alert("خطأ: اسم المستخدم أو الرقم السري غير صحيح!");
                
                snap.forEach(doc => {
                    let d = doc.data();
                    let opt = document.createElement('option');
                    opt.value = JSON.stringify(d);
                    opt.innerHTML = `${d.subject} - ${d.class} - ${d.section}`;
                    select.appendChild(opt);
                });
                document.getElementById('welcomeMsg').innerText = "مرحباً المدرس: " + name;
            }
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('gradesArea').style.display = 'block';
        }

        /* دالة تحميل الدرجات وعمليات الحفظ تبقى كما كانت سابقاً في نظامك */
        async function loadStudentGrades() { /* ... */ }
        async function saveGrades() { /* ... */ }
    </script>
</body>
</html>
