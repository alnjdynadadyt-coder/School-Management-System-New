<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المدرس الموحدة</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #loginArea { text-align: center; padding: 40px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; color: white; background: #007bff; font-weight: bold; width: 100%; }
        #gradesArea { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        input[type="text"] { width: 32px !important; text-align: center; padding: 2px; }
        .fail { color: red !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea">
            <h2>🔐 بوابة دخول المدرس</h2>
            <input type="text" id="teacherName" placeholder="اسم المستخدم">
            <input type="password" id="teacherPass" placeholder="الرقم السري">
            <button class="btn" onclick="checkPermissions()">دخول</button>
        </div>

        <div id="gradesArea">
            <h3 id="welcomeMsg"></h3>
            <select id="allowedClasses" onchange="loadSelectedGrades()">
                <option value="">اختر المادة / الصف المطلوب</option>
            </select>
            <table id="gradesTable">
                <thead id="headArea"></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn" style="background:#28a745; margin-top:20px;" onclick="saveGrades()">حفظ الدرجات</button>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px; width:100%;">تسجيل خروج</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            const pass = document.getElementById('teacherPass').value;
            let select = document.getElementById('allowedClasses');

            const snap = await db.collection("teachers_permissions").where("name", "==", name).where("password", "==", pass).get();
            if (snap.empty) return alert("خطأ: اسم المستخدم أو الرقم السري غير صحيح!");
            
            snap.forEach(doc => {
                let d = doc.data();
                let opt = document.createElement('option');
                opt.value = JSON.stringify(d);
                opt.innerHTML = `${d.subject} | ${d.class} - ${d.section}`;
                select.appendChild(opt);
            });
            document.getElementById('welcomeMsg').innerText = "مرحباً بك: " + name;
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('gradesArea').style.display = 'block';
        }

        async function loadSelectedGrades() {
            const selectedData = JSON.parse(document.getElementById('allowedClasses').value);
            const {class: cls, section: sec, subject: sub} = selectedData;
            
            const head = document.getElementById('headArea');
            const body = document.getElementById('gradesBody'); 
            body.innerHTML = "";
            
            head.innerHTML = `<tr><th>الطالب</th><th colspan="15">الدرجات</th></tr>`;
            
            const snap = await db.collection("students").where("class", "==", cls).get();
            let students = [];
            snap.forEach(s => { if(s.data().section == sec) students.push(s.data()); });
            students.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

            students.forEach(s => {
                let row = `<tr><td>${s.name}</td>`;
                for(let i=0; i<15; i++) { 
                    row += `<td><input type="text"></td>`; 
                }
                body.innerHTML += row + "</tr>";
            });

            const doc = await db.collection("grades").doc(`${cls}_${sec}_${sub}`).get();
            if (doc.exists) {
                const data = doc.data();
                document.querySelectorAll('#gradesBody tr').forEach(row => {
                    const name = row.cells[0].innerText;
                    if (data[name]) {
                        const inputs = row.querySelectorAll('input');
                        data[name].forEach((val, i) => { if(inputs[i]) inputs[i].value = val; });
                    }
                });
            }
        }

        async function saveGrades() {
            const selectedData = JSON.parse(document.getElementById('allowedClasses').value);
            const docRef = db.collection("grades").doc(`${selectedData.class}_${selectedData.section}_${selectedData.subject}`);
            const dataToSave = { teacher: selectedData.name };
            document.querySelectorAll('#gradesBody tr').forEach((row) => { 
                dataToSave[row.cells[0].innerText] = Array.from(row.querySelectorAll('input')).map(i => i.value); 
            });
            await docRef.set(dataToSave); 
            alert("تم حفظ الدرجات بنجاح!");
        }
    </script>
</body>
</html>
