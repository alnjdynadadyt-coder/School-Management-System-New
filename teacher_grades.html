<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المدرس الموحدة</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #loginArea { text-align: center; padding: 40px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; color: white; background: #007bff; font-weight: bold; }
        #gradesArea { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        .fail { color: red !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <!-- منطقة الدخول -->
        <div id="loginArea">
            <h2>🔐 بوابة دخول المدرس</h2>
            <input type="text" id="teacherName" placeholder="اسم المستخدم">
            <input type="password" id="teacherPass" placeholder="الرقم السري">
            <button class="btn" onclick="checkPermissions()">دخول</button>
        </div>

        <!-- منطقة العمل -->
        <div id="gradesArea">
            <h3 id="welcomeMsg"></h3>
            <select id="allowedClasses" onchange="loadSelectedGrades()">
                <option value="">اختر المادة / الصف المطلوب</option>
            </select>
            <table id="gradesTable">
                <thead id="headArea"></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn" style="width:100%; background:#28a745; margin-top:20px;" onclick="saveGrades()">حفظ الدرجات</button>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px;">تسجيل خروج</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. منطق الدخول (فلترة الصلاحيات)
        async function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            const pass = document.getElementById('teacherPass').value;
            let select = document.getElementById('allowedClasses');

            const snap = await db.collection("teachers_permissions").where("name", "==", name).where("password", "==", pass).get();
            if (snap.empty) return alert("خطأ: اسم المستخدم أو الرقم السري غير صحيح!");
            
            snap.forEach(doc => {
                let d = doc.data();
                let opt = document.createElement('option');
                opt.value = JSON.stringify(d);
                opt.innerHTML = `${d.subject} | ${d.class} - ${d.section}`;
                select.appendChild(opt);
            });
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('gradesArea').style.display = 'block';
        }

        // 2. دالة جلب الدرجات بناءً على الاختيار
        function loadSelectedGrades() {
            const selectedData = JSON.parse(document.getElementById('allowedClasses').value);
            // هنا يتم استدعاء منطق دالة loadGrades التي أرسلتها لي سابقاً مع استخدام متغيرات selectedData
            // ملاحظة: سأقوم بدمج منطق العرض الخاص بك في هذا المكان...
            alert("تم اختيار: " + selectedData.subject + " - الصف: " + selectedData.class);
            // يمكنك الآن إكمال ربط دالة loadGrades الأصلية الخاصة بك هنا
        }

        function saveGrades() { /* كود الحفظ المعتاد */ }
    </script>
</body>
</html>
