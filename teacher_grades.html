<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة المدرس</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 3px; text-align: center; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; background: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea">
            <h2>دخول المدرس</h2>
            <input type="text" id="teacherName" placeholder="اسم المدرس">
            <button class="btn" onclick="checkPermissions()">دخول</button>
        </div>

        <div id="gradesArea" style="display:none;">
            <h3 id="welcomeMsg"></h3>
            <select id="allowedClasses" onchange="loadStudentGrades()"></select>
            <table id="gradesTable">
                <thead id="headArea"></thead>
                <tbody id="gradesBody"></tbody>
            </table>
            <button class="btn" style="width:100%; margin-top:15px;" onclick="saveGrades()">حفظ الدرجات</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. تسجيل الدخول وجلب الصلاحيات
        async function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            const snap = await db.collection("teachers_permissions").where("name", "==", name).get();
            if (snap.empty) return alert("اسم غير مصرح له!");

            let select = document.getElementById('allowedClasses');
            select.innerHTML = '<option value="">اختر الصف والمادة</option>';
            snap.forEach(doc => {
                let d = doc.data();
                let opt = document.createElement('option');
                opt.value = JSON.stringify(d);
                opt.innerHTML = `${d.subject} - ${d.class} - ${d.section}`;
                select.appendChild(opt);
            });
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('gradesArea').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = "مرحباً: " + name;
        }

        // 2. دالة جلب الطلاب (مدمجة من ملفك القديم)
        async function loadStudentGrades() {
            const data = JSON.parse(document.getElementById('allowedClasses').value);
            const head = document.getElementById('headArea');
            const body = document.getElementById('gradesBody');
            body.innerHTML = "";

            if (data.subject === "الإنكليزي" || data.subject === "الحاسوب") {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="7">الفصل الأول</th><th>ن.سنة</th><th colspan="7">الفصل الثاني</th><th>السعي</th></tr>`;
            } else {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="5">الفصل الأول</th><th>نصف السنة</th><th colspan="5">الفصل الثاني</th><th>النتيجة</th></tr>`;
            }

            const snap = await db.collection("students").where("class", "==", data.class).get();
            snap.forEach(s => {
                if(s.data().section == data.section) {
                    body.innerHTML += `<tr><td>${s.data().name}</td>` + '<td><input type="text"></td>'.repeat(16) + `</tr>`;
                }
            });
            
            // جلب الدرجات المحفوظة لنفس المدرس والمادة والصف
            const gDoc = await db.collection("grades").doc(`${data.class}_${data.section}_${data.subject}`).get();
            if (gDoc.exists) {
                // (هنا يمكنك إضافة كود تعبئة الحقول إذا كانت الدرجات موجودة)
            }
        }
        
        function saveGrades() { alert("تم الربط بنجاح! يمكنك الآن إضافة كود الحفظ الفعلي."); }
    </script>
</body>
</html>
