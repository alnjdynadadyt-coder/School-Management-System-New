<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة المدرس</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="loginArea">
        <h2>أدخل اسم المدرس</h2>
        <input type="text" id="teacherName" placeholder="اسم المدرس">
        <button onclick="checkPermissions()">دخول</button>
    </div>

    <div id="gradesArea" style="display:none;">
        <h3 id="welcomeMsg"></h3>
        <select id="allowedClasses"></select>
        <!-- هنا سيتم عرض جدول الدرجات الخاص بالصف المختار -->
    </div>

    <script>
        const db = firebase.firestore();
        let teacherPermissions = [];

        async function checkPermissions() {
            const name = document.getElementById('teacherName').value;
            const snapshot = await db.collection("teachers_permissions").where("name", "==", name).get();
            
            if (snapshot.empty) {
                alert("اسم غير مصرح له أو خطأ في الاسم!");
                return;
            }

            teacherPermissions = [];
            let select = document.getElementById('allowedClasses');
            select.innerHTML = "";

            snapshot.forEach(doc => {
                let d = doc.data();
                teacherPermissions.push(d);
                let opt = document.createElement('option');
                opt.value = `${d.class}-${d.section}`;
                opt.innerHTML = `${d.subject} - ${d.class} - ${d.section}`;
                select.appendChild(opt);
            });

            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('gradesArea').style.display = 'block';
        }
    </script>
</body>
</html>
