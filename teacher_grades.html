<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الدرجات - النسخة النهائية</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        #mainContent { display: none; }
        .controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <!-- بوابة الدخول -->
    <div id="authScreen" style="text-align:center; padding-top:100px;">
        <h2>تسجيل دخول المدرس</h2>
        <input type="text" id="teacherInput" placeholder="أدخل اسم المدرس">
        <button id="loginBtn">دخول</button>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="mainContent">
        <div class="controls">
            <input type="text" id="teacherName" readonly style="font-weight:bold; border:none; background:none;">
            <select id="permSelect"></select>
            <button onclick="triggerLoad()">جلب البيانات</button>
        </div>
        <table id="gradesTable">
            <thead id="headArea"></thead>
            <tbody id="gradesBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('loginBtn').onclick = async function() {
            const name = document.getElementById('teacherInput').value.trim();
            const snap = await db.collection("teachers_permissions").where("name", "==", name).get();
            if (snap.empty) { alert("اسم غير مسجل!"); return; }

            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('teacherName').value = "المدرس: " + name;

            const permSelect = document.getElementById('permSelect');
            snap.forEach(doc => {
                let d = doc.data();
                let opt = document.createElement('option');
                opt.value = JSON.stringify(d);
                opt.innerText = `${d.class} - ${d.section} - ${d.subject}`;
                permSelect.appendChild(opt);
            });
        };

        function triggerLoad() {
            const data = JSON.parse(document.getElementById('permSelect').value);
            loadGrades(data.class, data.section, data.subject);
        }

        // هنا تضع دالتك الأصلية loadGrades مع تعديل بسيط لتستقبل القيم من المعاملات
        function loadGrades(cls, sec, sub) {
            alert("جاري جلب بيانات: " + sub + " للصف " + cls);
            // ضع هنا كود جلب الطلاب من Firebase الخاص بك
            const body = document.getElementById('gradesBody');
            body.innerHTML = ""; // تنظيف الجدول
            db.collection("students").where("class", "==", cls).get().then(snap => {
                snap.forEach(s => {
                    if(s.data().section == sec) {
                        body.innerHTML += `<tr><td>${s.data().name}</td><td><input type="text"></td></tr>`;
                    }
                });
            });
        }
    </script>
</body>
</html>
