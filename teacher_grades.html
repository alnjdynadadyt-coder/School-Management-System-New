<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الدرجات المباشر</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        #mainContent { display: none; }
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .auth-container { margin-top: 100px; }
    </style>
</head>
<body>

    <!-- بوابة الدخول المباشرة -->
    <div id="authScreen" class="auth-container">
        <h2>تسجيل دخول المدرس</h2>
        <input type="text" id="teacherInput" placeholder="أدخل اسم المدرس">
        <button onclick="loginAndAccess()">دخول</button>
    </div>

    <!-- الصفحة الرئيسية (مخفية حتى يتم الدخول) -->
    <div id="mainContent">
        <!-- هنا يوضع محتوى صفحتك الأصلي بالكامل -->
        <h1>تم الدخول بنجاح</h1>
        <p>مرحباً بك في صفحة الدرجات.</p>
    </div>

    <script>
        const db = firebase.firestore();

        async function loginAndAccess() {
            const name = document.getElementById('teacherInput').value.trim();
            const snap = await db.collection("teachers_permissions").where("name", "==", name).get();
            
            if (!snap.empty) {
                // إخفاء البوابة وإظهار الصفحة مباشرة
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                // هنا سيتم تفعيل كل دوالك الأصلية تلقائياً
            } else {
                alert("اسم غير مصرح به!");
            }
        }
    </script>
</body>
</html>
