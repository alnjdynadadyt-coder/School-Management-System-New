<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الأرشيف</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .item { border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .btn-restore { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html">⬅️ العودة للرئيسية</a>
        <h3>📦 سجلات الحضور المؤرشفة</h3>
        <div id="archiveList">جاري تحميل السجلات...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // تحميل الأرشيف لحظة بلحظة
        db.collection("archived_attendance").onSnapshot(snap => {
            const list = document.getElementById('archiveList');
            list.innerHTML = '';
            
            if (snap.empty) { list.innerHTML = '<p>الأرشيف فارغ حالياً.</p>'; return; }

            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="item">
                        <div>
                            <strong>التاريخ الأصلي: ${data.originalDate}</strong><br>
                            <small>تم الأرشفة في: ${data.archivedAt.substring(0, 10)}</small>
                        </div>
                        <div>
                            <button class="btn btn-restore" onclick="restoreRecord('${doc.id}')">استعادة</button>
                            <button class="btn btn-delete" onclick="deletePermanent('${doc.id}')">حذف نهائي</button>
                        </div>
                    </div>`;
            });
        });

        // دالة الاستعادة (تعيد البيانات للمجموعة الرئيسية)
        async function restoreRecord(id) {
            if (!confirm("هل أنت متأكد من استعادة هذا السجل إلى قائمة الحضور الرئيسية؟")) return;
            
            const doc = await db.collection("archived_attendance").doc(id).get();
            const data = doc.data();
            
            // إعادة السجل للمجموعة الأصلية
            await db.collection("attendance").doc(data.originalDate).set({ data: data.data }, { merge: true });
            // مسحه من الأرشيف
            await db.collection("archived_attendance").doc(id).delete();
            
            alert("تمت استعادة السجل بنجاح!");
        }

        // دالة الحذف النهائي
        async function deletePermanent(id) {
            if (!confirm("⚠️ تحذير: سيتم حذف البيانات من الأرشيف نهائياً ولا يمكن استرجاعها!")) return;
            await db.collection("archived_attendance").doc(id).delete();
            alert("تم الحذف النهائي.");
        }
    </script>
</body>
</html>
