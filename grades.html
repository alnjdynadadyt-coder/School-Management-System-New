<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الدرجات - النسخة النهائية</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f4f4; }
        .header-panel { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .controls { display: flex; gap: 5px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        th, td { border: 1px solid #000; padding: 4px; text-align: center; }
        input { width: 45px; border: none; text-align: center; }
        .std-name { text-align: right; width: 150px; }
        /* خاص بالطباعة */
        #printHeader { display: none; margin-bottom: 10px; }
        @media print {
            .no-print { display: none; }
            #printHeader { display: block; font-size: 16px; font-weight: bold; }
        }
    </style>
</head>
<body>
    <div class="header-panel no-print">
        <input type="text" id="tName" placeholder="اسم المدرس" style="width:100px;">
        <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option></select>
        <select id="gSection"><option>أ</option><option>ز</option></select>
        <select id="sub"><option>الإسلامية</option><option>العربي</option></select>
        <div class="controls">
            <button onclick="loadStudents()">جلب الطلاب</button>
            <button onclick="saveData()" style="background:green; color:white;">حفظ الدرجات</button>
            <button onclick="window.print()">طباعة PDF</button>
            <button onclick="exportExcel()">تصدير Excel</button>
        </div>
    </div>

    <div id="printHeader">
        المدرس: <span id="pT"></span> | المادة: <span id="pS"></span> | الصف: <span id="pC"></span> | الشعبة: <span id="pSec"></span>
    </div>

    <table id="tbl">
        <thead>
            <tr><th class="std-name">الطالب</th><th>ش1</th><th>ش2</th><th>م.ش1</th><th>يومي1</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>ش2</th><th>م.ش2</th><th>يومي2</th><th>فصل2</th><th>السعي</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const db = firebase.firestore();
        function calc(row) {
            const i = row.querySelectorAll('input');
            i[2].value = Math.round((+i[0].value + +i[1].value) / 2) || "";
            i[8].value = Math.round((+i[6].value + +i[7].value) / 2) || "";
            i[11].value = Math.round((+i[4].value + +i[5].value + +i[10].value + +i[8].value) / 4) || "";
        }

        async function loadStudents() {
            const cls = document.getElementById('gClass').value, sec = document.getElementById('gSection').value, sub = document.getElementById('sub').value;
            document.getElementById('pT').innerText = document.getElementById('tName').value;
            document.getElementById('pS').innerText = sub;
            document.getElementById('pC').innerText = cls;
            document.getElementById('pSec').innerText = sec;
            
            const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
            const snap = await db.collection("students").where("class", "==", cls).get();
            snap.forEach(s => {
                if(s.data().section == sec) {
                    tbody.innerHTML += `<tr><td class="std-name">${s.data().name}</td>${'<td><input type="number" oninput="calc(this.parentElement.parentElement)"></td>'.repeat(12)}</tr>`;
                }
            });
        }

        function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tbl')), "الدرجات.xlsx"); }
        function saveData() { alert("تم الحفظ"); }
    </script>
</body>
</html>
