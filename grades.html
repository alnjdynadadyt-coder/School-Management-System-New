<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الدرجات المتطور</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 5px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        input { width: 40px; }
        .btn { padding: 8px; border: none; border-radius: 5px; cursor: pointer; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <button id="backBtn" class="btn" style="background:#6c757d;" onclick="window.history.back()">🔙 العودة</button>
        <div class="controls">
            <input type="text" id="teacherName" placeholder="اسم المدرس">
            <select id="gClass">
                <option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option>
                <option>الرابع الأدبي</option><option>الخامس الأدبي</option><option>السادس الأدبي</option>
            </select>
            <select id="gSection">
                <option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option>
            </select>
            <select id="subject" onchange="checkSubject(this.value)">
                <option>الإسلامية</option><option>العربي</option><option>الإنكليزي</option><option>الرياضيات</option><option>الفيزياء</option><option>الكيمياء</option><option>الأحياء</option><option>التاريخ</option><option>الجغرافية</option><option>الاقتصاد</option><option>علم النفس</option><option>الحاسوب</option><option>الرياضة</option><option>الفنية</option><option value="other">أخرى...</option>
            </select>
            <input type="text" id="otherSubject" placeholder="اكتب المادة" style="display:none;">
            <button class="btn" style="background:#007bff;" onclick="loadGrades()">جلب البيانات</button>
            <button class="btn" style="background:#28a745;" onclick="exportExcel()">Excel</button>
            <button class="btn" style="background:#dc3545;" onclick="exportPDF()">PDF</button>
        </div>
        <table>
            <thead>
                <tr><th>الطالب</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>فصل2</th><th>السعي</th></tr>
            </thead>
            <tbody id="gradesBody"></tbody>
        </table>
        <button class="btn" style="width:100%; background:#007bff; margin-top:10px;" onclick="saveGrades()">حفظ</button>
    </div>

    <script>
        const db = firebase.firestore();
        function checkSubject(val) { document.getElementById('otherSubject').style.display = (val === 'other') ? 'block' : 'none'; }
        
        function loadGrades() {
            const body = document.getElementById('gradesBody'); body.innerHTML = "";
            db.collection("students").where("class", "==", document.getElementById('gClass').value)
                                     .where("section", "==", document.getElementById('gSection').value).get().then(snap => {
                snap.forEach(s => {
                    body.innerHTML += `<tr><td>${s.data().name}</td><td><input class="s1"></td><td><input class="s2"></td><td><input class="m1 readonly" readonly></td><td><input class="day"></td><td><input class="f1 readonly" readonly></td><td><input class="mid"></td><td><input class="s3"></td><td><input class="s4"></td><td><input class="m2 readonly" readonly></td><td><input class="f2"></td><td><input class="yearly readonly" readonly></td></tr>`;
                });
            });
        }
        
        function exportExcel() { /* منطق Excel */ alert("تم التصدير لـ Excel"); }
        function exportPDF() { /* منطق PDF */ alert("تم التصدير لـ PDF"); }
        function saveGrades() { alert("تم الحفظ بنجاح!"); }
    </script>
</body>
</html>
