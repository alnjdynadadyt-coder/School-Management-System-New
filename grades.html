<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الدرجات - النسخة الذهبية المحدثة</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 3px; text-align: center; }
        th:first-child, td:first-child { min-width: 130px; text-align: right; }
        input[type="number"] { width: 32px !important; padding: 2px; border: 1px solid #ddd; border-radius: 3px; text-align: center; }
        .c-f1 { background-color: #fff9c4 !important; } .c-mid { background-color: #e8f5e9 !important; } .c-f2 { background-color: #e3f2fd !important; } .c-final { background-color: #fce4ec !important; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        @media print { .btn, button { display: none !important; } }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn" style="background:#6c757d;" onclick="window.history.back()">🔙 العودة</button>
        <div class="controls">
            <input type="text" id="teacherName" placeholder="اسم المدرس" required>
            <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
            <select id="gSection"><option>1</option><option>2</option><option>3</option></select>
            <input type="text" id="subject" placeholder="اسم المادة" list="subs" required>
            <datalist id="subs"><option value="الإنكليزي"><option value="الحاسوب"><option value="الإسلامية"><option value="العربي"><option value="الرياضيات"><option value="الفيزياء"></datalist>
            <button class="btn" style="background:#007bff;" onclick="loadGrades()">جلب الطلاب</button>
            <button class="btn" style="background:#28a745;" onclick="exportExcel()">تصدير Excel</button>
        </div>
        <table id="gradesTable">
            <thead id="headArea"></thead>
            <tbody id="gradesBody"></tbody>
        </table>
        <button class="btn" style="width:100%; background:#007bff; margin-top:15px;" onclick="saveGrades()">حفظ الدرجات</button>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function loadGrades() {
            const sub = document.getElementById('subject').value;
            const head = document.getElementById('headArea');
            const body = document.getElementById('gradesBody'); body.innerHTML = "";
            
            if(sub === "الإنكليزي" || sub === "الحاسوب") {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="7" class="c-f1">الفصل الأول</th><th class="c-mid">ن.سنة</th><th colspan="7" class="c-f2">الفصل الثاني</th><th class="c-final">السعي</th></tr><tr><th></th><th>ش1</th><th>يومي</th><th>ش2</th><th>يومي</th><th>مج.ش1</th><th>مج.ش2</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>يومي</th><th>ش2</th><th>يومي</th><th>مج.ش1</th><th>مج.ش2</th><th>فصل2</th><th>السعي</th></tr>`;
            } else {
                head.innerHTML = `<tr><th>الطالب</th><th colspan="5" class="c-f1">الفصل الأول</th><th class="c-mid">نصف السنة</th><th colspan="5" class="c-f2">الفصل الثاني</th><th class="c-final">السعي</th></tr><tr><th></th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي1</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي2</th><th>فصل2</th><th>النتيجة</th></tr>`;
            }
            
            db.collection("students").where("class", "==", document.getElementById('gClass').value).get().then(snap => {
                snap.forEach(s => {
                    if(s.data().section == document.getElementById('gSection').value) {
                        const count = (sub === "الإنكليزي" || sub === "الحاسوب") ? 16 : 12;
                        let row = `<tr><td>${s.data().name}</td>`;
                        for(let k=0; k<count; k++) row += `<td><input type="number" oninput="calculate(this.parentElement.parentElement)"></td>`;
                        body.innerHTML += row + "</tr>";
                    }
                });
            });
        }

        function calculate(row) {
            const sub = document.getElementById('subject').value;
            const i = row.querySelectorAll('input');
            if(sub === "الإنكليزي" || sub === "الحاسوب") {
                i[4].value = (i[0].value && i[1].value) ? (+i[0].value + +i[1].value) : "";
                i[5].value = (i[2].value && i[3].value) ? (+i[2].value + +i[3].value) : "";
                i[6].value = (i[4].value && i[5].value) ? Math.round((+i[4].value + +i[5].value) / 2) : "";
                i[12].value = (i[8].value && i[9].value) ? (+i[8].value + +i[9].value) : "";
                i[13].value = (i[10].value && i[11].value) ? (+i[10].value + +i[11].value) : "";
                i[14].value = (i[12].value && i[13].value) ? Math.round((+i[12].value + +i[13].value) / 2) : "";
                i[15].value = (i[6].value !== "" && i[7].value !== "" && i[14].value !== "") ? Math.round((+i[6].value + +i[7].value + +i[14].value) / 3) : "";
            } else {
                if(i[0].value && i[1].value) i[2].value = Math.round((+i[0].value + +i[1].value)/2);
                if(i[2].value && i[3].value) i[4].value = Math.round((+i[2].value + +i[3].value)/2);
                if(i[6].value && i[7].value) i[8].value = Math.round((+i[6].value + +i[7].value)/2);
                if(i[8].value && i[9].value) i[10].value = Math.round((+i[8].value + +i[9].value)/2);
                if(i[4].value && i[5].value && i[10].value) i[11].value = Math.round((+i[4].value + +i[5].value + +i[10].value)/3);
            }
            i.forEach(inp => { if(inp.value && inp.value <= 49) inp.classList.add('fail'); else inp.classList.remove('fail'); });
        }

        async function saveGrades() {
            const cls = document.getElementById('gClass').value, sec = document.getElementById('gSection').value, sub = document.getElementById('subject').value;
            const docRef = db.collection("grades").doc(`${cls}_${sec}_${sub}`);
            const data = { teacher: document.getElementById('teacherName').value };
            document.querySelectorAll('#gradesBody tr').forEach(row => {
                data[row.cells[0].innerText] = Array.from(row.querySelectorAll('input')).map(i => i.value);
            });
            await docRef.set(data); alert("تم الحفظ!");
        }

        function exportExcel() { /* دالة التصدير الأصلية - بنفس منطق الـ loadGrades */ }
    </script>
</body>
</html>
