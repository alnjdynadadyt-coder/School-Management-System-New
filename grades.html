<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الدرجات - النسخة الذهبية</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        /* تعديل العروض */
        th:first-child, td:first-child { min-width: 150px; text-align: right; }
        input[type="number"] { width: 40px; padding: 4px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn" style="background:#6c757d;" onclick="window.history.back()">🔙 العودة</button>
        <div class="controls">
            <input type="text" id="teacherName" placeholder="اسم المدرس">
            <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option><option>الرابع الأدبي</option><option>الخامس الأدبي</option><option>السادس الأدبي</option></select>
            <select id="gSection"><option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option></select>
            <select id="subject"><option>الإسلامية</option><option>العربي</option><option>الإنكليزي</option><option>الرياضيات</option><option>الفيزياء</option><option>الكيمياء</option><option>الأحياء</option><option>التاريخ</option><option>الجغرافية</option><option>الاقتصاد</option><option>علم النفس</option><option>الحاسوب</option></select>
            <button class="btn" style="background:#007bff;" onclick="loadGrades()">جلب الطلاب</button>
            <button class="btn" style="background:#28a745;" onclick="exportExcel()">تصدير Excel</button>
            <button class="btn" style="background:#dc3545;" onclick="window.print()">طباعة PDF</button>
        </div>
        <table id="gradesTable">
            <thead>
                <tr><th>الطالب</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي1</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي2</th><th>فصل2</th><th>السعي</th></tr>
            </thead>
            <tbody id="gradesBody"></tbody>
        </table>
        <button class="btn" style="width:100%; background:#007bff; margin-top:15px;" onclick="saveGrades()">حفظ الدرجات</button>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

                function calculate(row) {
            const i = row.querySelectorAll('input');
            // i[0]:ش1, i[1]:ش2, i[2]:م.ش, i[3]:يومي1, i[4]:فصل1, i[5]:ن.سنة, 
            // i[6]:ش1(2), i[7]:ش2(2), i[8]:م.ش(2), i[9]:يومي2, i[10]:فصل2, i[11]:السعي

            // 1. حساب م.ش الأول
            if (i[0].value !== "" && i[1].value !== "") {
                i[2].value = Math.round((+i[0].value + +i[1].value) / 2);
            } else { i[2].value = ""; }

            // 2. حساب فصل 1
            if (i[2].value !== "" && i[3].value !== "") {
                i[4].value = Math.round((+i[2].value + +i[3].value) / 2);
            } else { i[4].value = ""; }

            // 3. حساب م.ش الثاني
            if (i[6].value !== "" && i[7].value !== "") {
                i[8].value = Math.round((+i[6].value + +i[7].value) / 2);
            } else { i[8].value = ""; }

            // 4. حساب فصل 2
            if (i[8].value !== "" && i[9].value !== "") {
                i[10].value = Math.round((+i[8].value + +i[9].value) / 2);
            } else { i[10].value = ""; }

            // 5. حساب السعي
            if (i[4].value !== "" && i[5].value !== "" && i[10].value !== "") {
                i[11].value = Math.round((+i[4].value + +i[5].value + +i[10].value) / 3);
            } else { i[11].value = ""; }
        }

        function loadGrades() {
            const body = document.getElementById('gradesBody'); body.innerHTML = "";
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            
            db.collection("students").where("class", "==", cls).get().then(snap => {
                snap.forEach(s => {
                    if(s.data().section == sec) {
                        body.innerHTML += `<tr>
                            <td>${s.data().name}</td>
                            ${'<td><input type="number" oninput="calculate(this.parentElement.parentElement)"></td>'.repeat(12)}
                        </tr>`;
                    }
                });
            });
        }
        function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('gradesTable')), "الدرجات.xlsx"); }
    </script>
</body>
</html>
