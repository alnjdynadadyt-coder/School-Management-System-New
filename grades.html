<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الدرجات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 12px; }
        .controls { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; align-items: center; }
        select, input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        input[type="number"] { width: 40px; }
        .btn { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn" style="background:#6c757d;" onclick="window.history.back()">🔙 العودة</button>
        <div class="controls">
            <input type="text" id="teacherName" placeholder="اسم المدرس" style="width:100px;">
            <select id="gClass">
                <option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option>
                <option>الرابع الأدبي</option><option>الخامس الأدبي</option><option>السادس الأدبي</option>
            </select>
            <select id="gSection"><option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option></select>
            <select id="subject" onchange="if(this.value=='other') document.getElementById('otherSub').style.display='inline'; else document.getElementById('otherSub').style.display='none';">
                <option>الإسلامية</option><option>العربي</option><option>الرياضيات</option><option>الفيزياء</option><option>الكيمياء</option><option>الأحياء</option><option value="other">أخرى...</option>
            </select>
            <input type="text" id="otherSub" placeholder="المادة" style="display:none; width:60px;">
            <button class="btn" style="background:#007bff;" onclick="loadGrades()">جلب الطلاب</button>
            <button class="btn" style="background:#28a745;" onclick="exportExcel()">Excel</button>
        </div>
        <table id="gradesTable">
            <thead>
                <tr><th>الطالب</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>فصل2</th><th>السعي</th></tr>
            </thead>
            <tbody id="gradesBody"></tbody>
        </table>
        <button class="btn" style="width:100%; background:#007bff; margin-top:10px;" onclick="saveGrades()">حفظ</button>
    </div>

    <script>
        const db = firebase.firestore();
        
        function loadGrades() {
            const body = document.getElementById('gradesBody'); body.innerHTML = "";
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            
            db.collection("students")
              .where("class", "==", cls)
              .where("section", "==", sec)
              .get().then(snap => {
                if(snap.empty) { alert("لا يوجد طلاب بهذا الصف والشعبة"); return; }
                snap.forEach(s => {
                    body.innerHTML += `<tr><td>${s.data().name}</td><td><input type="number"></td><td><input type="number"></td><td></td><td><input type="number"></td><td></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td></td><td><input type="number"></td><td></td></tr>`;
                });
            });
        }

        function exportExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById('gradesTable'));
            XLSX.writeFile(wb, "سجل_الدرجات.xlsx");
        }

        function saveGrades() { alert("تم الحفظ"); }
    </script>
</body>
</html>
