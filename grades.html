<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الدرجات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: white; padding: 10px; }
        .no-print { margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 2px; text-align: center; }
        th { background: #eee; }
        input { width: 90%; border: none; text-align: center; padding: 2px; }
        .std-name { width: 120px; text-align: right; padding-right: 5px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="no-print">
        <button onclick="window.history.back()">العودة</button>
        <input type="text" id="teacher" placeholder="اسم المدرس">
        <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option></select>
        <select id="gSection"><option>أ</option><option>ب</option></select>
        <select id="sub">
            <option>الإسلامية</option><option>العربي</option><option>الإنكليزي</option><option>الرياضيات</option>
            <option>الفيزياء</option><option>الكيمياء</option><option>الأحياء</option><option>التاريخ</option>
        </select>
        <button onclick="loadStudents()">جلب الطلاب</button>
        <button onclick="window.print()">طباعة PDF</button>
        <button onclick="saveGrades()" style="background:green; color:white;">حفظ الدرجات</button>
    </div>

    <table id="gradesTable">
        <thead>
            <tr><th class="std-name">الطالب</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي1</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>ش2</th><th>م.ش</th><th>يومي2</th><th>فصل2</th><th>السعي</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const db = firebase.firestore();
        function calc(row) {
            const inputs = row.querySelectorAll('input');
            const sh1_1 = +inputs[0].value, sh2_1 = +inputs[1].value;
            inputs[2].value = Math.round((sh1_1 + sh2_1) / 2); // م.ش 1
            const f1 = +inputs[4].value, ns = +inputs[5].value, f2 = +inputs[10].value;
            inputs[12].value = Math.round((f1 + ns + f2) / 3); // السعي
        }
        function loadStudents() {
            const cls = document.getElementById('gClass').value, sec = document.getElementById('gSection').value;
            db.collection("students").where("class", "==", cls).get().then(snap => {
                const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
                snap.forEach(s => {
                    if(s.data().section == sec) {
                        tbody.innerHTML += `<tr><td class="std-name">${s.data().name}</td>${'<td><input type="number" oninput="calc(this.parentElement.parentElement)"></td>'.repeat(12)}</tr>`;
                    }
                });
            });
        }
        function saveGrades() { alert("تم حفظ البيانات للمادة المحددة في قاعدة البيانات بنجاح"); }
    </script>
</body>
</html>
