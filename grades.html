<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الدرجات المطور</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .no-print { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #007bff; color: white; font-size: 13px; }
        input { width: 40px; border: 1px solid #ddd; text-align: center; border-radius: 3px; }
        .std-name { text-align: right; width: 150px; font-weight: bold; }
        @media print { .no-print { display: none; } table { font-size: 10px; } }
    </style>
</head>
<body>
    <div class="no-print">
        <input type="text" id="teacher" placeholder="اسم المدرس">
        <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option></select>
        <select id="gSection"><option>أ</option><option>ز</option></select>
        <select id="sub"><option>الإسلامية</option><option>العربي</option></select>
        <button onclick="loadData()">جلب الطلاب</button>
        <button onclick="window.print()">طباعة PDF</button>
        <button onclick="exportExcel()">تصدير Excel</button>
        <button onclick="saveData()" style="background:green; color:white;">حفظ الدرجات</button>
    </div>

    <table id="tbl">
        <thead>
            <tr><th class="std-name">الطالب</th><th>ش1</th><th>ش2</th><th>م.ش1</th><th>يومي1</th><th>فصل1</th><th>ن.سنة</th><th>ش1</th><th>ش2</th><th>م.ش2</th><th>يومي2</th><th>فصل2</th><th>السعي</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const db = firebase.firestore();
        // معادلة الحساب الدقيقة
        function calc(row) {
            const i = row.querySelectorAll('input');
            const ms1 = Math.round((+i[0].value + +i[1].value) / 2) || 0;
            i[2].value = ms1;
            const ms2 = Math.round((+i[6].value + +i[7].value) / 2) || 0;
            i[8].value = ms2;
            const sa = Math.round((+i[4].value + +i[5].value + +i[10].value + ms2) / 4) || 0;
            i[11].value = sa;
        }

        async function loadData() {
            const sub = document.getElementById('sub').value;
            const cls = document.getElementById('gClass').value;
            const sec = document.getElementById('gSection').value;
            const docId = `${cls}_${sec}_${sub}`;
            
            const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
            const students = await db.collection("students").where("class", "==", cls).get();
            const saved = await db.collection("grades").doc(docId).get();
            const data = saved.exists ? saved.data() : {};

            students.forEach(s => {
                if(s.data().section == sec) {
                    const row = tbody.insertRow();
                    row.insertCell().innerText = s.data().name;
                    for(let j=0; j<12; j++) {
                        const cell = row.insertCell();
                        cell.innerHTML = `<input type="number" oninput="calc(this.parentElement.parentElement)" value="${data[s.id] ? data[s.id][j] : ''}">`;
                    }
                }
            });
        }

        async function saveData() {
            const rows = document.querySelectorAll('#tbody tr');
            const data = {};
            rows.forEach(r => {
                const inputs = r.querySelectorAll('input');
                data[r.cells[0].innerText] = Array.from(inputs).map(i => i.value);
            });
            await db.collection("grades").doc(`${document.getElementById('gClass').value}_${document.getElementById('gSection').value}_${document.getElementById('sub').value}`).set(data);
            alert("تم حفظ الدرجات بنجاح");
        }

        function exportExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById('tbl'));
            XLSX.writeFile(wb, "الدرجات.xlsx");
        }
    </script>
</body>
</html>
