<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الدرجات - النظام المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 60px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        .readonly { background: #eee; font-weight: bold; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3>نظام إدخال الدرجات</h3>
        <div class="controls">
            <select id="gClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
            <select id="gSection"><option>أ</option><option>ب</option></select>
            <button class="btn" style="background:#007bff;" onclick="loadGrades()">جلب الطلاب</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>الطالب</th><th>ش1(ف1)</th><th>ش2(ف1)</th><th>م.ش(ف1)</th><th>يومي</th><th>فصل1</th><th>نصف.س</th><th>ش1(ف2)</th><th>ش2(ف2)</th><th>م.ش(ف2)</th><th>السعي السنوي</th>
                </tr>
            </thead>
            <tbody id="gradesBody"></tbody>
        </table>
        <button class="btn" style="margin-top:20px; width:100%; background:#28a745;" onclick="saveGrades()">حفظ الدرجات</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw", authDomain: "school-2-2026.firebaseapp.com", projectId: "school-2-2026", storageBucket: "school-2-2026.firebasestorage.app", messagingSenderId: "283472829932", appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function calculateGrades(row) {
            const sh1_f1 = parseFloat(row.querySelector('.sh1_f1').value) || 0;
            const sh2_f1 = parseFloat(row.querySelector('.sh2_f1').value) || 0;
            const day = parseFloat(row.querySelector('.day').value) || 0;
            const mid = parseFloat(row.querySelector('.mid').value) || 0;
            const sh1_f2 = parseFloat(row.querySelector('.sh1_f2').value) || 0;
            const sh2_f2 = parseFloat(row.querySelector('.sh2_f2').value) || 0;

            const avgM1 = Math.round((sh1_f1 + sh2_f1) / 2);
            const term1 = Math.round((avgM1 + day) / 2);
            const avgM2 = Math.round((sh1_f2 + sh2_f2) / 2);
            const yearly = Math.round((term1 + mid + avgM2) / 3);

            row.querySelector('.avgM1').value = avgM1;
            row.querySelector('.term1').value = term1;
            row.querySelector('.avgM2').value = avgM2;
            row.querySelector('.yearly').value = yearly;
        }

        function loadGrades() {
            const body = document.getElementById('gradesBody'); body.innerHTML = "";
            db.collection("students").where("class", "==", document.getElementById('gClass').value).get().then(snap => {
                snap.forEach(s => {
                    body.innerHTML += `<tr>
                        <td>${s.data().name}</td>
                        <td><input type="number" class="sh1_f1" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="sh2_f1" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="avgM1 readonly" readonly></td>
                        <td><input type="number" class="day" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="term1 readonly" readonly></td>
                        <td><input type="number" class="mid" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="sh1_f2" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="sh2_f2" oninput="calculateGrades(this.parentElement.parentElement)"></td>
                        <td><input type="number" class="avgM2 readonly" readonly></td>
                        <td><input type="number" class="yearly readonly" readonly></td>
                    </tr>`;
                });
            });
        }

        function saveGrades() {
            const docId = `${document.getElementById('gClass').value}_${document.getElementById('gSection').value}`;
            const data = {};
            document.querySelectorAll('#gradesBody tr').forEach(row => {
                data[row.cells[0].innerText] = { yearly: row.querySelector('.yearly').value };
            });
            db.collection("grades").doc(docId).set({ data }).then(() => alert("✅ تم حفظ الدرجات بنجاح"));
        }
    </script>
</body>
</html>
