<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير اليومي المجمع</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; }
        .back-btn { background: #95a5a6; color: white; padding: 8px 18px; border-radius: 10px; text-decoration: none; font-size: 14px; }
        
        h3 { text-align: center; color: var(--primary-color); margin: 0; }
        #dateLabel { text-align: center; color: var(--accent-color); font-weight: bold; margin: 10px 0; }
        
        .controls { display: flex; justify-content: center; margin-bottom: 20px; }
        input[type="date"] { padding: 10px 15px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; outline: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border-radius: 15px; overflow: hidden; }
        th { background: var(--primary-color); color: white; padding: 15px; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f6fa; }
        
        .btn-print { background: var(--success-color); color: white; padding: 15px 40px; border: none; border-radius: 12px; width: 100%; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 25px; }
        .btn-print:hover { background: #219150; transform: scale(1.01); }

        @media print { 
            .btn-print, .controls, .back-btn { display: none !important; } 
            body { background: white; } 
            .container { box-shadow: none; width: 100%; }
            table { border: 1px solid #333; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <a href="index.html" class="back-btn">⬅️ العودة للرئيسية</a>
        </div>
        
        <h3>تقرير الغيابات والإجازات اليومي</h3>
        <div id="dateLabel"></div>

        <div class="controls">
            <input type="date" id="dateFilter" onchange="loadReport()">
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>الصف/الشعبة</th>
                    <th>اسم الطالب</th>
                    <th>تفاصيل الغياب/الإجازة</th>
                </tr>
            </thead>
            <tbody id="reportBody"></tbody>
        </table>
        <button class="btn-print" onclick="window.print()">🖨️ طباعة التقرير</button>
    </div>

    <script>
        // إعدادات الربط للمشروع الجديد (School 2 2026)
        const firebaseConfig = {
            apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw",
            authDomain: "school-2-2026.firebaseapp.com",
            projectId: "school-2-2026",
            storageBucket: "school-2-2026.firebasestorage.app",
            messagingSenderId: "283472829932",
            appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9",
            measurementId: "G-74F1K1HBE4"
        };
        
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('dateFilter').valueAsDate = new Date();

        async function loadReport() {
            const date = document.getElementById('dateFilter').value;
            const body = document.getElementById('reportBody');
            const dateLabel = document.getElementById('dateLabel');
            
            const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            const dayName = days[new Date(date).getDay()];
            dateLabel.innerHTML = `${dayName} - ${date}`;
            
            body.innerHTML = "<tr><td colspan='3'>جاري جلب البيانات...</td></tr>";

            try {
                const [studentsSnap, attendSnap] = await Promise.all([
                    db.collection("students").get(),
                    db.collection("attendance").get()
                ]);

                const students = {};
                studentsSnap.forEach(doc => students[doc.id] = doc.data().name);

                let reportData = {};

                attendSnap.forEach(doc => {
                    if(doc.id.startsWith(date)) {
                        const data = doc.data().data;
                        const parts = doc.id.split('_'); 
                        const classSection = `${parts[1]} - ${parts[2]}`;

                        for(let studentId in data) {
                            if(data[studentId] !== "حاضر") {
                                if(!reportData[studentId]) {
                                    reportData[studentId] = { 
                                        name: students[studentId] || "طالب غير معروف", 
                                        class: classSection, 
                                        absences: [] 
                                    };
                                }
                                const lesson = parts[3].replace("الدرس ", "");
                                const status = data[studentId];
                                const color = status === "غائب" ? "#e74c3c" : "#f39c12"; 
                                reportData[studentId].absences.push(
                                    `${lesson} (<span style="color:${color}; font-weight:bold;">${status}</span>)`
                                );
                            }
                        }
                    }
                });

                body.innerHTML = "";
                const sortedKeys = Object.keys(reportData).sort((a, b) => 
                    reportData[a].name.localeCompare(reportData[b].name)
                );
                
                if(sortedKeys.length === 0) {
                    body.innerHTML = "<tr><td colspan='3'>لا توجد غيابات مسجلة لهذا اليوم</td></tr>";
                } else {
                    sortedKeys.forEach(id => {
                        let s = reportData[id];
                        body.innerHTML += `<tr><td>${s.class}</td><td>${s.name}</td><td>${s.absences.join(' | ')}</td></tr>`;
                    });
                }
            } catch(e) {
                body.innerHTML = "<tr><td colspan='3'>خطأ: تأكد من اتصال الإنترنت</td></tr>";
            }
        }
        loadReport();
    </script>
</body>
</html>
