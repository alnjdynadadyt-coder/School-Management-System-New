<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة طباعة الشهادات والنتائج</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        .full-width { grid-column: span 2; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; font-size: 14px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; width: 100%; font-size: 16px; }
        .btn-load { background: #28a745; }
        .btn-print { background: #007bff; margin-top: 20px; display: none; }
        
        /* تصميم الشهادة المدرسية */
        .certificate-card { border: 5px double #007bff; padding: 30px; margin-top: 20px; border-radius: 15px; background: #fff; position: relative; display: none; }
        .cert-header { text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 15px; margin-bottom: 20px; }
        .cert-header h2 { margin: 0; color: #007bff; }
        .student-info { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 16px; background: #f1f8ff; padding: 10px 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #007bff; color: white; }
        .cert-footer { margin-top: 30px; display: flex; justify-content: space-between; font-weight: bold; }
        
        #backBtn { display: inline-block; margin-bottom: 15px; color: #6c757d; text-decoration: none; font-weight: bold; }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; padding: 0; border: none; }
            .controls, #backBtn, .btn-print, header, .no-print { display: none !important; }
            .certificate-card { display: block !important; border: 3px solid #000; box-shadow: none; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" id="backBtn">⬅️ العودة للرئيسية</a>
        <h2>🎓 إصدار الشهادات والنتائج المدرسية</h2>
        
        <!-- لوحة التحكم العامة للإعدادات وتطبيقها على الجميع -->
        <div class="controls">
            <div>
                <label>نوع النظام:</label>
                <select id="systemType">
                    <option value="final">صف وضوحي/منتهٍ (يشمل إعفاء وقرار)</option>
                    <option value="non-final">صف غير منتهٍ (نظام عادي)</option>
                </select>
            </div>
            <div>
                <label>درجة القرار المضافة:</label>
                <select id="decisionDegree">
                    <option value="0">بدون قرار (0)</option>
                    <option value="5" selected>5 درجات</option>
                    <option value="10">10 درجات</option>
                </select>
            </div>
            <div>
                <label>الحد الأقصى لمواد الإكمال:</label>
                <select id="maxFailSubjects">
                    <option value="1">درس واحد</option>
                    <option value="2">درسان</option>
                    <option value="3" selected>ثلاثة دروس</option>
                    <option value="all">جميع المواد</option>
                </select>
            </div>
            <div>
                <label>اختر الصف:</label>
                <select id="classSelect">
                    <option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option>
                    <option>الرابع الادبي</option><option>الخامس الادبي</option><option>السادس الادبي</option>
                </select>
            </div>
            <div>
                <label>اختر الشعبة:</label>
                <select id="sectionSelect">
                    <option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option>
                </select>
            </div>
            <div style="grid-column: span 2;">
                <button class="btn btn-load" onclick="generateCertificates()">جلب وعرض شهادات الطلاب</button>
            </div>
        </div>

        <!-- منطقة عرض الشهادات -->
        <div id="certificatesContainer"></div>
        
        <button class="btn btn-print" id="printAllBtn" onclick="window.print()">🖨️ طباعة الشهادات المعروضة</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw",
            authDomain: "school-2-2026.firebaseapp.com",
            projectId: "school-2-2026",
            storageBucket: "school-2-2026.firebasestorage.app",
            messagingSenderId: "283472829932",
            appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9"
        };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function generateCertificates() {
            const className = document.getElementById('classSelect').value;
            const sectionName = document.getElementById('sectionSelect').value;
            const systemType = document.getElementById('systemType').value;
            const decisionVal = parseInt(document.getElementById('decisionDegree').value);
            const maxFailVal = document.getElementById('maxFailSubjects').value;
            
            const container = document.getElementById('certificatesContainer');
            container.innerHTML = "<p style='text-align:center;'>جاري جلب بيانات الطلاب والدرجات وحساب النتائج...</p>";

            try {
                // 1. جلب طلاب الصف والشعبة
                const studentsSnap = await db.collection("students")
                    .where("class", "==", className)
                    .where("section", "==", sectionName)
                    .get();

                if(studentsSnap.empty) {
                    container.innerHTML = "<p style='text-align:center; color:red;'>لا يوجد طلاب في هذا الصف والشعبة.</p>";
                    document.getElementById('printAllBtn').style.display = "none";
                    return;
                }

                // 2. جلب كافة درجات المواد لهذا الصف والشعبة
                const gradesSnap = await db.collection("grades")
                    .where("class", "==", className) // افتراض تخزين الصف في المستند أو اسم المستند
                    .get();
                
                // سنقوم بجمع درجات كل طالب عبر المواد
                let studentGradesMap = {};
                
                // جلب كل المستندات في مجموعة grades
                const allGradesSnap = await db.collection("grades").get();
                allGradesSnap.forEach(doc => {
                    // هيكل معرف المستند المتوقع: class_section_subject أو حسب نظامك، لنفحص البيانات داخله
                    const data = doc.data();
                    // إذا كان المستند يمثل مادة معينة ويحتوي على درجات الطلاب كحقول
                    // أو إذا كانت البيانات مخزنة بشكل ماب لكل طالب
                    for(let studentName in data) {
                        if(studentName !== "class" && studentName !== "section" && studentName !== "subject") {
                            if(!studentGradesMap[studentName]) studentGradesMap[studentName] = {};
                            // نفترض أن المستند يحمل اسم المادة أو بداخله اسم المادة
                            let subName = data.subject || doc.id.split('_').slice(2).join('_');
                            studentGradesMap[studentName][subName] = data[studentName];
                        }
                    }
                });

                container.innerHTML = "";
                let htmlOutput = "";

                studentsSnap.forEach(studentDoc => {
                    const student = studentDoc.data();
                    const sName = student.name;
                    const sGrades = studentGradesMap[sName] || {};

                    let totalScore = 0;
                    let countSubjects = 0;
                    let failCount = 0;
                    let lowestDegree = 100;
                    let subjectsRows = "";

                    for(let sub in sGrades) {
                        let originalMark = Number(sGrades[sub].final || sGrades[sub] || 0);
                        let finalMark = originalMark;
                        let statusText = "ناجح";

                        // تطبيق درجة القرار إذا كان الطالب مائلاً للرسوب (مثلاً من (50 - قرار) إلى 49)
                        if(finalMark < 50 && finalMark >= (50 - decisionVal)) {
                            finalMark = 50; // رفع بالقرار
                        }

                        if(finalMark < 50) {
                            failCount++;
                            statusText = "راسب/مكمل";
                        }

                        totalScore += finalMark;
                        countSubjects++;
                        if(finalMark < lowestDegree) lowestDegree = finalMark;

                        subjectsRows += `<tr>
                            <td>${sub}</td>
                            <td>${originalMark}</td>
                            <td>${finalMark} ${originalMark !== finalMark ? '<small>(مساعده)</small>' : ''}</td>
                            <td>${statusText}</td>
                        </tr>`;
                    }

                    let avg = countSubjects > 0 ? (totalScore / countSubjects).toFixed(1) : 0;
                    let finalResultState = "ناجح";
                    let exemptionStatus = "";

                    // فحص الإعفاء العام (للصفوف المنتهية حصراً وبشروط محددة)
                    if(systemType === "final" && avg >= 85 && lowestDegree >= 75) {
                        exemptionStatus = "🌟 معفى إعفاءً عاماً";
                    }

                    // حساب الإكمال والرسوب
                    if(failCount > 0) {
                        if(maxFailVal === "all" || failCount <= parseInt(maxFailVal)) {
                            finalResultState = `مكمل في (${failCount} مواد)`;
                        } else {
                            finalResultState = "راسب";
                        }
                    }

                    // بناء كارت الشهادة لكل طالب
                    htmlOutput += `
                    <div class="certificate-card">
                        <div class="cert-header">
                            <h2>جمهورية العراق - وزارة التربية</h2>
                            <p>موسوعة إدارة المدرسة الذكية - شهادة نهاية العام الدراسي</p>
                        </div>
                        <div class="student-info">
                            <div>اسم الطالب: ${sName}</div>
                            <div>الصف: ${className} (${sectionName})</div>
                            <div>النتيجة: <span style="color: ${failCount === 0 ? 'green':'red'}">${finalResultState}</span></div>
                        </div>
                        ${exemptionStatus ? `<div style="text-align:center; background:#d4edda; color:#155724; padding:8px; border-radius:5px; margin-bottom:15px; font-weight:bold;">${exemptionStatus}</div>` : ''}
                        <table>
                            <thead>
                                <tr>
                                    <th>المادة الدراسية</th>
                                    <th>الدرجة الأصلية</th>
                                    <th>الدرجة النهائية (بعد القرار)</th>
                                    <th>الحالة</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${subjectsRows || "<tr><td colspan='4'>لا توجد درجات مدخلة لهذا الطالب.</td></tr>"}
                            </tbody>
                        </table>
                        <div style="margin-top: 15px; font-weight: bold;">
                            المعدل العام: ${avg}%
                        </div>
                        <div class="cert-footer">
                            <div>توقيع إدارة المدرسة</div>
                            <div>مختبر المدرسة / ختم الإدارة</div>
                        </div>
                    </div>`;
                });

                container.innerHTML = htmlOutput;
                document.getElementById('printAllBtn').style.display = "block";

            } catch (err) {
                container.innerHTML = `<p style='text-align:center; color:red;'>حدث خطأ أثناء جلب البيانات: ${err.message}</p>`;
                document.getElementById('printAllBtn').style.display = "none";
            }
        }
    </script>
</body>
</html>
