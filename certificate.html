<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الشهادات والنتائج المدرسية - الصف السادس</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; font-size: 14px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; width: 100%; font-size: 16px; }
        .btn-load { background: #28a745; }
        .btn-print { background: #007bff; margin-top: 20px; display: none; }
        
        .result-card { border: 3px solid #007bff; padding: 20px; margin-top: 20px; border-radius: 12px; background: #fff; display: none; }
        .card-header { text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 8px; margin-bottom: 12px; }
        .card-header h3 { margin: 0; color: #007bff; font-size: 18px; }
        .student-meta { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; background: #f1f8ff; padding: 8px; border-radius: 6px; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 8px; table-layout: auto; }
        th, td { border: 1px solid #ddd; padding: 5px 2px; text-align: center; font-size: 11px; word-break: break-all; }
        th { background-color: #007bff; color: white; font-size: 11px; }

        .footer-note { margin-top: 20px; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; border-top: 1px dashed #ccc; padding-top: 10px; }
        #backBtn { display: inline-block; margin-bottom: 15px; color: #6c757d; text-decoration: none; font-weight: bold; }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; padding: 0; border: none; }
            .controls, #backBtn, .btn-print, header { display: none !important; }
            .result-card { display: block !important; page-break-after: always; border: 2px solid #000; padding: 10px; }
            table, th, td { font-size: 10px; padding: 4px 1px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" id="backBtn">⬅️ العودة للرئيسية</a>
        <h2>🎓 نظام استخراج النتائج والشهادات (الصف السادس الابتدائي/الإعدادي)</h2>
        
        <div class="controls">
            <div>
                <label>طريقة العرض:</label>
                <select id="viewMode">
                    <option value="individual">نتيجة فردية (تفصيلية لكل طالب)</option>
                    <option value="all-table">نتيجة عامة للجميع (جدول السعي والمواد)</option>
                </select>
            </div>
            <div>
                <label>درجة القرار:</label>
                <select id="decisionDegree">
                    <option value="0">بدون قرار (0)</option>
                    <option value="5" selected>5 درجات</option>
                    <option value="10">10 درجات</option>
                </select>
            </div>
            <div>
                <label>الحد الأقصى لمواد الإكمال:</label>
                <select id="maxFailSubjects">
                    <option value="1">درس واحد</option>
                    <option value="2">درسان</option>
                    <option value="3" selected>ثلاثة دروس</option>
                    <option value="all">جميع المواد</option>
                </select>
            </div>
            <div>
                <label>الصف:</label>
                <select id="classSelect">
                    <option>السادس العلمي</option>
                    <option>السادس الادبي</option>
                </select>
            </div>
            <div>
                <label>الشعبة:</label>
                <select id="sectionSelect">
                    <option>أ</option><option>ب</option><option>ج</option><option>د</option>
                </select>
            </div>
            <div style="grid-column: span 2;">
                <button class="btn btn-load" onclick="processResults()">عرض النتائج واستخراج الشهادات</button>
            </div>
        </div>

        <div id="resultsContainer"></div>
        <button class="btn btn-print" id="printAllBtn" onclick="window.print()">🖨️ طباعة النتائج المعروضة</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCd3OM5lfSqrXMuPylaR_bgjHoKo006Stw",
            authDomain: "school-2-2026.firebaseapp.com",
            projectId: "school-2-2026",
            storageBucket: "school-2-2026.firebasestorage.app",
            messagingSenderId: "283472829932",
            appId: "1:283472829932:web:1ca7b0cb663c6f4aff74c9"
        };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const subjectOrders = {
            "السادس العلمي": ["الاسلامية", "العربي", "الانكليزي", "رياضيات", "الاحياء", "الكيمياء", "الفيزياء", "الرياضة", "الفنية"],
            "السادس الادبي": ["الاسلامية", "العربي", "الانكليزي", "رياضيات", "التاريخ", "الجغرافية", "الاقتصاد", "الرياضة", "الفنية"]
        };

        function normalizeSubjectName(name) {
            if (!name) return "";
            return name.trim()
                .replace(/^الإسلامية$/, "الاسلامية")
                .replace(/^الإنكليزي$/, "الانكليزي")
                .replace(/^الرياضيات$/, "رياضيات");
        }

        function extractSubjectMarks(sub, subObj) {
            let f1 = '-', mid = '-', f2 = '-', saei = 0;
            if (!subObj) return { f1, mid, f2, saei };

            if (Array.isArray(subObj)) {
                if (sub === "الانكليزي" || sub === "الحاسوب") {
                    f1 = subObj[6] !== undefined && subObj[6] !== "" ? subObj[6] : '-';
                    mid = subObj[7] !== undefined && subObj[7] !== "" ? subObj[7] : '-';
                    f2 = subObj[14] !== undefined && subObj[14] !== "" ? subObj[14] : '-';
                    saei = subObj[15] !== undefined && subObj[15] !== "" ? Number(subObj[15]) || 0 : 0;
                } else {
                    f1 = subObj[4] !== undefined && subObj[4] !== "" ? subObj[4] : (subObj[2] !== undefined ? subObj[2] : '-');
                    mid = subObj[5] !== undefined && subObj[5] !== "" ? subObj[5] : '-';
                    f2 = subObj[10] !== undefined && subObj[10] !== "" ? subObj[10] : '-';
                    saei = subObj[11] !== undefined && subObj[11] !== "" ? Number(subObj[11]) || 0 : 0;
                }
            } else {
                saei = Number(subObj) || 0;
            }
            return { f1, mid, f2, saei };
        }

        async function processResults() {
            const className = document.getElementById('classSelect').value;
            const sectionName = document.getElementById('sectionSelect').value;
            const container = document.getElementById('resultsContainer');
            
            container.innerHTML = "<p style='text-align:center;'>جاري جلب بيانات الطلاب والدرجات...</p>";

            try {
                const studentsSnap = await db.collection("students")
                    .where("class", "==", className)
                    .where("section", "==", sectionName)
                    .get();

                if(studentsSnap.empty) {
                    container.innerHTML = "<p style='text-align:center; color:red;'>لا يوجد طلاب مسجلين في هذا الصف والشعبة.</p>";
                    document.getElementById('printAllBtn').style.display = "none";
                    return;
                }

                let studentGradesMap = {};
                const allGradesSnap = await db.collection("grades").get();
                
                allGradesSnap.forEach(doc => {
                    const data = doc.data();
                    let rawSubName = doc.id.split('_').slice(2).join('_') || "مادة";
                    let subName = normalizeSubjectName(rawSubName);
                    
                    for(let studentName in data) {
                        if(studentName !== "class" && studentName !== "section" && studentName !== "subject" && studentName !== "teacher") {
                            if(!studentGradesMap[studentName]) studentGradesMap[studentName] = {};
                            studentGradesMap[studentName][subName] = data[studentName];
                        }
                    }
                });

                container.innerHTML = "";
                let htmlOutput = "";
                const standardOrder = subjectOrders[className] || [];

                const viewMode = document.getElementById('viewMode').value;
                const decisionVal = parseInt(document.getElementById('decisionDegree').value);
                const maxFailVal = document.getElementById('maxFailSubjects').value;
                const maxFailLimit = (maxFailVal === "all") ? 999 : parseInt(maxFailVal);

                if (viewMode === 'individual') {
                    studentsSnap.forEach(studentDoc => {
                        const sName = studentDoc.data().name;
                        const sGrades = studentGradesMap[sName] || {};
                        
                        let availableSubs = Object.keys(sGrades);
                        let sortedSubs = [...standardOrder.filter(sub => availableSubs.includes(sub)), ...availableSubs.filter(sub => !standardOrder.includes(sub))];

                        // الخطوة 1: حساب الرسوب الفعلي (بدون قرار لمعرفة ما إذا كان الطالب مستحقاً للقرار أصلاً)
                        let rawFailCount = 0;
                        sortedSubs.forEach(sub => {
                            let marks = extractSubjectMarks(sub, sGrades[sub]);
                            if (marks.saei < 50) rawFailCount++;
                        });

                        // هل يستحق القرار؟ (إذا كان عدد الرسوب الفعلي ضمن حدود الإكمال أو ناجح)
                        let isEligibleForDecision = (rawFailCount <= maxFailLimit);

                        let failCount = 0;
                        let rows = "";

                        sortedSubs.forEach(sub => {
                            let marks = extractSubjectMarks(sub, sGrades[sub]);
                            let f1 = marks.f1, mid = marks.mid, f2 = marks.f2, saei = marks.saei;

                            let finalMark = saei;
                            let isHelped = false;

                            if (isEligibleForDecision && decisionVal > 0) {
                                if (finalMark < 50 && finalMark >= (50 - decisionVal)) {
                                    finalMark = 50;
                                    isHelped = true;
                                }
                            }

                            if (finalMark < 50) failCount++;

                            let displayName = (sub === "رياضيات") ? "الرياضيات" : (sub === "الاسلامية" ? "الإسلامية" : (sub === "الانكليزي" ? "الإنكليزي" : sub));

                            let displayFinalText = "";
                            if (isHelped) {
                                displayFinalText = `${saei} <span style="color:blue; font-weight:bold;">(50 ق)</span>`;
                            } else if (finalMark < 50) {
                                displayFinalText = `<span style="color:red; font-weight:bold;">${saei}</span>`;
                            } else {
                                displayFinalText = `<b>${saei}</b>`;
                            }

                            rows += `<tr>
                                <td>${displayName}</td>
                                <td>${f1}</td>
                                <td>${mid}</td>
                                <td>${f2}</td>
                                <td><b>${saei}</b></td>
                                <td>${displayFinalText}</td>
                            </tr>`;
                        });

                        let finalRes = "ناجح";
                        if (failCount > 0) {
                            if (failCount <= maxFailLimit) {
                                finalRes = `مكمل (${failCount} مواد)`;
                            } else {
                                finalRes = "راسب";
                            }
                        }

                        htmlOutput += `
                        <div class="result-card">
                            <div class="card-header">
                                <h3>اعدادية النجدين للبنين- جمهورية العراق - وزارة التربية</h3>
                                <p>نتيجة الطالب النهائية (الصف السادس)</p>
                            </div>
                            <div class="student-meta">
                                <div>اسم الطالب: ${sName}</div>
                                <div>الصف: ${className} (${sectionName})</div>
                                <div>النتيجة: <span style="color:${failCount===0?'green':(failCount<=maxFailLimit?'orange':'red')}">${finalRes}</span></div>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>المادة</th>
                                        <th>فصل 1</th>
                                        <th>نصف السنة</th>
                                        <th>فصل 2</th>
                                        <th>السعي السنوي</th>
                                        <th>الدرجة النهائية</th>
                                    </tr>
                                </thead>
                                <tbody>${rows || "<tr><td colspan='6'>لا توجد درجات مسجلة.</td></tr>"}</tbody>
                            </table>
                            <div class="footer-note">
                                <div>توقيع اللجنة الامتحانية</div>
                                <div>ختم المدرسة</div>
                            </div>
                        </div>`;
                    });
                } else {
                    let sampleStudent = studentsSnap.docs[0];
                    let sampleGrades = studentGradesMap[sampleStudent.data().name] || {};
                    let availableSubs = Object.keys(sampleGrades);
                    let sortedSubs = [...standardOrder.filter(sub => availableSubs.includes(sub)), ...availableSubs.filter(sub => !standardOrder.includes(sub))];

                    let tableHeaders = "<th>اسم الطالب</th>";
                    sortedSubs.forEach(sub => {
                        let displayName = (sub === "رياضيات") ? "الرياضيات" : (sub === "الاسلامية" ? "الإسلامية" : (sub === "الانكليزي" ? "الإنكليزي" : sub));
                        tableHeaders += `<th>${displayName}</th>`;
                    });
                    tableHeaders += "<th>النتيجة النهائية</th>";

                    let tableRows = "";
                    studentsSnap.forEach(studentDoc => {
                        const sName = studentDoc.data().name;
                        const sGrades = studentGradesMap[sName] || {};
                        
                        let rawFailCount = 0;
                        sortedSubs.forEach(sub => {
                            let marks = extractSubjectMarks(sub, sGrades[sub]);
                            if (marks.saei < 50) rawFailCount++;
                        });

                        let isEligibleForDecision = (rawFailCount <= maxFailLimit);
                        let failCount = 0;
                        let subCells = "";
                        
                        sortedSubs.forEach(sub => {
                            let marks = extractSubjectMarks(sub, sGrades[sub]);
                            let saei = marks.saei;

                            let finalMark = saei;
                            let isHelped = false;

                            if (isEligibleForDecision && decisionVal > 0) {
                                if (finalMark < 50 && finalMark >= (50 - decisionVal)) {
                                    finalMark = 50;
                                    isHelped = true;
                                }
                            }

                            if (finalMark < 50) failCount++;

                            let cellText = "";
                            if (isHelped) {
                                cellText = `${saei} <span style="color:blue; font-weight:bold;">(50 ق)</span>`;
                            } else if (finalMark < 50) {
                                cellText = `<span style="color:red; font-weight:bold;">${saei}</span>`;
                            } else {
                                cellText = `${saei}`;
                            }

                            subCells += `<td>${cellText}</td>`;
                        });

                        let finalRes = failCount === 0 ? "ناجح" : (failCount <= maxFailLimit ? `مكمل (${failCount})` : "راسب");

                        tableRows += `<tr>
                            <td>${sName}</td>
                            ${subCells}
                            <td style="font-weight:bold; color:${failCount===0?'green':(failCount<=maxFailLimit?'orange':'red')}">${finalRes}</td>
                        </tr>`;
                    });

                    htmlOutput = `
                    <div class="result-card" style="display:block;">
                        <div class="card-header">
                            <h3>جدول درجات السعي السنوي والنتائج النهائية - الصف السادس</h3>
                            <p>الصف: ${className} - الشعبة: ${sectionName}</p>
                        </div>
                        <table>
                            <thead><tr>${tableHeaders}</tr></thead>
                            <tbody>${tableRows || "<tr><td colspan='10'>لا توجد بيانات.</td></tr>"}</tbody>
                        </table>
                    </div>`;
                }

                container.innerHTML = htmlOutput;
                document.getElementById('printAllBtn').style.display = "block";

            } catch (err) {
                container.innerHTML = `<p style='text-align:center; color:red;'>حدث خطأ: ${err.message}</p>`;
                document.getElementById('printAllBtn').style.display = "none";
            }
        }
    </script>
</body>
</html>
